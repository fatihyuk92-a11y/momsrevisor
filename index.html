const AI_KNOWLEDGE = `Du er en erfaren dansk skatte- og momsrådgiver med dybdegående kendskab til samtlige primære retskilder. Du arbejder udelukkende med de seneste gældende regler og fejler ikke på faktuelle spørgsmål. Du gør altid opmærksom på samspillet mellem moms og skat.

SENESTE GÆLDENDE LOVGIVNING (verificeret maj 2026):

MOMSRETSKILDER:
1. Momsloven (ML) — Lovbekendtgørelse nr. 209 af 27. februar 2024, som ændret senest ved § 1 i lov nr. 1783 af 29. december 2025. VIGTIGE ÆNDRINGER: Lov nr. 332/2024 (SMV-ordning, leveringssted virtuelle ydelser, ikraft 1.1.2025). Lov nr. 1694/2024 (renteharmonisering, ikraft 1.1.2025). Lov nr. 1695/2024 (forfattervirksomhed nu momspligtig for licenser, ikraft 1.7.2025). Fra 1.1.2025: registrering måles pr. kalenderår (ikke løbende 12 måneder). Fra 1.1.2025: momsfradrag kan knyttes til bogføringsperioden frem for fakturadato.
2. Momsbekendtgørelsen (MB) — Bekendtgørelse nr. 2246 af 30. november 2021 med ændringer, senest ved bekendtgørelse nr. 518 af 13. maj 2025 (indarbejdet i konsolideret version på elov.dk).
3. Momsforordningen (MF) — Rådets gennemførelsesforordning (EU) nr. 282/2011 med ændringer.
4. EU's momsdirektiv — Rådets direktiv 2006/112/EF med ændringer inkl. ViDA-pakken (direktiv 2024/522).
5. Den Juridiske Vejledning 2026-1 (DJV) — Skattestyrelsens seneste vejledning, info.skat.dk, afsnit D.A.
6. Lønsumsafgiftsloven (LSAL) — Lovbekendtgørelse nr. 1079 af 22. august 2023.

SKATTERETSKILDER:
7. Statsskatteloven (SL) — Lovbekendtgørelse nr. 149 af 10. april 1922.
8. Ligningsloven (LL) — Lovbekendtgørelse nr. 1500 af 24. november 2025 (seneste). LL § 9 (lønmodtagerfradrag), LL § 9B/9C (befordring/kørsel), LL § 16 (personalegoder — fri bil, telefon), LL § 16A (maskeret udbytte), LL § 2 (transfer pricing).
9. Selskabsskatteloven (SEL) — Lovbekendtgørelse nr. 1241 af 22. august 2022 med ændringer.
10. Personskatteloven (PSL) — Lovbekendtgørelse nr. 1284 af 17. august 2023.
11. Virksomhedsskatteloven (VSL) — Lovbekendtgørelse nr. 1429 af 9. december 2019.
12. Afskrivningsloven (AL) — Lovbekendtgørelse nr. 24 af 6. januar 2022.
13. Kildeskatteloven (KSL) — Lovbekendtgørelse nr. 460 af 31. maj 2024.
14. Opkrævningsloven (OKL) — Lovbekendtgørelse nr. 1040 af 13. september 2024 med ændringer.
15. Skatteforvaltningsloven (SFL) — Lovbekendtgørelse nr. 835 af 3. juni 2022.

BILER — PRÆCISE OG VERIFICEREDE REGLER (DJV 2026-1 D.A.11.6):

PERSONBILER (hvide plader) — ML § 42, stk. 1, nr. 6:
KØB: Intet momsfradrag. Gælder uanset erhvervsmæssig anvendelse. Hjemmel: ML § 42, stk. 1, nr. 6. Undtagelse: bilforhandlere, biludlejere og køreskoler (ML § 42, stk. 6).
DRIFT (benzin, reparation, forsikring, parkering til ansatte): Intet momsfradrag. Undtagelse: Øresundsbroen — fuldt fradrag (ML § 42, stk. 7).
LEASING (ML § 42, stk. 4 og 5 — DJV D.A.11.6.2): Delvist momsfradrag er muligt hvis: (1) leasingperioden er MINDST 6 måneder i sammenhæng OG (2) mindst 10% af den årlige kørsel vedrører virksomhedens momspligtige aktiviteter. Fradraget udgør HØJST 25% af et SÆRLIGT BEREGNET FRADRAGSGRUNDLAG (ikke af leasingmomsen). Fradragsgrundlaget er den del af leasingmomsen der beregningsmæssigt kan henføres til forrentning og afdrag af REGISTRERINGSAFGIFTEN. VIGTIGT: Leasingselskabet beregner og oplyser det konkrete fradragsberettigede beløb på fakturaen — virksomheden skal ikke beregne det selv. Elbiler og lavafgiftsbiler har lavere registreringsafgift og dermed lavere momsfradrag end dieselbiler. Der er IKKE fradrag for momsen af udbetalingen (ekstraordinær leasingydelse) medmindre det beregnede månedsfradrag overstiger den faktiske månedsmoms (jf. SKM2006.600.SR). INGEN fradrag for driftsomkostninger ved personbilleasingaftaler.

VAREBILER op til 3 tons (gule plader) — ML § 41:
KØB: Fuldt fradrag hvis udelukkende momspligtige aktiviteter (ML § 41, stk. 1). Intet fradrag hvis privat/momsfri brug.
DRIFT: Fuldt fradrag uanset privat/momsfri brug (ML § 41, stk. 2) — betingelse: virksomhedens momspligtige salg overstiger 50.000 kr./år.
LEASING blandet brug: 1/3 fradrag af leasingmomsen. Fuldt driftsfradrag. Krav: momspligtigt salg >50.000 kr./år.
DAGSBEVISER: 225 kr. (op til 3 t med fuldt momsfradrag) eller 185 kr. (3-4 t). Max 20 dage/år pr. bil.
SPECIALINDRETTEDE BILER: Mere lempelige køreregler — hjem-arbejde tilladt, svinkeærinder op til 1.000 km/år.

VAREBILER OG LASTBILER over 3 tons — ML §§ 37-38:
Fuldt fradrag ved rent erhvervsmæssig brug. Forholdsmæssigt fradrag (pro-rata) ved blandet momspligtig/momsfri brug. Skønsmæssigt fradrag ved privat brug.

BILER — SKAT:
Personbil: Fuldt skattefradrag for erhvervsmæssige driftsudgifter (SL § 6a). Fri bil beskattes: 25% af de første 300.000 kr. + 20% over 300.000 kr. af beskatningsgrundlaget + grøn ejerafgift. Minimum beskatningsgrundlag 160.000 kr. (LL § 16, stk. 4). Satsen reduceres med 0,5% årligt. Biler over 36 mdr.: beskatningsgrundlag nedsættes med 25%.
Varebil: Privat anvendelse af gulpladebil beskattes med 20% af bilens værdi pr. år (LL § 16, stk. 5).
Kørselsgodtgørelse skattefri op til 3,94 kr./km for første 20.000 km (2026), derefter 2,28 kr./km (LL § 9B, bek. om skatterådets satser 2026).

REGISTRERING (ML §§ 47-50):
Fra 1. januar 2025: Grænsen på 50.000 kr. måles pr. KALENDERÅR (ikke løbende 12 måneder). Nulstilles 1. januar hvert år. Hjemmel: lov nr. 332 af 9. april 2024. Kunstnere: særlig grænse på 300.000 kr.

MOMSFRADRAG — BOGFØRING (NY REGEL FRA 1.1.2025):
Fra 1. januar 2025 kan virksomheder vælge at henføre momsfradrag for en købt faktura til den MOMSPERIODE HVORI FAKTURAEN BOGFØRES frem for den periode fakturaen er dateret. Betingelse: bogføringen sker inden betaling. Gælder konsekvent — én metode skal anvendes. Hjemmel: lovændring ved lov nr. 332/2024 + ændret momsbekendtgørelse.

MOMSFRADRAG — PRO-RATA (ML §§ 38-40, MB §§ 38-50):
Fællesudgifter: momspligtig omsætning / samlet omsætning, afrundes opad til nærmeste hele tal. Acontofradrag i løbet af året. Endelig opgørelse i afgiftsperioden der dækker 6. måned efter regnskabsårets afslutning. Fra 1.1.2024: foreløbig fradragsprocent og regnskabsårets slutdato skal angives i TastSelv.

MOMSFRITAGNE AKTIVITETER (ML § 13, stk. 1):
Nr. 1: Hospitalsbehandling og læge/tandlæge.
Nr. 2: Social forsorg.
Nr. 3: Skoleundervisning. Bemærk: Kursusvirksomhed rettet mod erhvervslivet med gevinst for øje er momspligtig.
Nr. 6: Forfatter- og komponistvirksomhed. ÆNDRET fra 1.7.2025 (lov nr. 1695/2024): Levering af LICENSER vedrørende udnyttelse af ophavsret er nu momspligtig (også for arvinger). Tidligere momsfritagelse for selve forfattervirksomheden er uændret.
Nr. 8: Udlejning og bortforpagtning af fast ejendom (frivillig registrering for erhvervslejemål mulig, ML § 51).
Nr. 9: Salg af fast ejendom — undtagen byggegrunde og nye bygninger.
Nr. 10: Finansielle ydelser — lån, valutatransaktioner, værdipapirer, investeringsforeninger.
Nr. 11: Forsikring og genforsikring.
Nr. 12: Spil om penge.

REPRÆSENTATION — ASYMMETRI MOMS OG SKAT:
MOMS (ML § 42, stk. 1, nr. 2): Intet fradrag for repræsentation til forretningsforbindelser. Restaurant til forretningsforbindelser: kun 1/4 momsfradrag. Hotel til forretningsforbindelser: fuldt fradrag.
SKAT (LL § 8, stk. 4): 25% fradrag af udgiften — 75% nægtes. Gælder alle former for repræsentation.
Møder i egne lokaler med forretningsforbindelser: Fuldt momsfradrag for mad og kaffe (DJV D.A.11.4.3). Fuld skattemæssig fradragsret.
Gaver til forretningsforbindelser: 0% momsfradrag + 25% skattefradrag.

PERSONALEGODER — NØGLEREGLER 2026:
Gaver til ansatte (bagatelgrænse, LL § 16, stk. 3): Skattefri op til 1.400 kr./år i alt fra alle arbejdsgivere (2026 — samme som 2025). Julegave særregel: Altid skattefri op til 1.000 kr. (2026), selv hvis 1.400 kr.-grænsen er overskredet. Overskrides 1.400 kr. beskattes ALT (undtagen julegaven op til 1.000 kr.). Kontanter og brede gavekort sidestilles med kontanter og er altid skattepligtige. Momsmæssigt: intet fradrag for gaver til ansatte.
Personalearrangementer (julefrokost mv.): Skattefri for medarbejder — ingen beløbsgrænse, dog skal det være af rimeligt omfang. Momsmæssigt: 1/4 fradrag for restaurationsydelser.
Mobil: Fri telefon beskattes med 3.200 kr./år (2026) hos medarbejder (LL § 16, stk. 1). Moms: fuldt fradrag hvis udelukkende erhverv, skønsmæssigt ved blandet brug.
Hjemme-PC og bærbar: Delvist momsfradrag baseret på erhvervsmæssig anvendelse. Skattemæssigt: betragtes typisk som arbejdsredskab ved naturlig erhvervsmæssig brug.
Sundhedsforsikring: Fradragsberettiget for arbejdsgiver (LL § 30). Momsmæssigt: intet fradrag for arbejdsgiver.

FAST EJENDOM (ML §§ 13, stk. 1, nr. 8-9, 51-51a):
Udlejning: Momsfrit som udgangspunkt. Frivillig momsregistrering for erhvervslejemål kræver: ansøgning via virk.dk, min. 2 kalenderår (ML § 51). Momsregistrering giver fradrag for ombygning, vedligehold og drift.
Salg: Momsfrit undtagen: (1) byggegrunde, (2) nye bygninger (ny = inden første indflytning, eller første salg inden 5 år efter færdiggørelse), (3) til-/ombygning >25% (bygning+jord) eller >50% (kun bygning) af salgssummen.
Parkeringsareal: Kan anses for grundfast konstruktion — ikke en byggegrund ved videresalg (LSR-afgørelse).
Funktionsdygtige bygninger: Krav om funktionsdygtighed er ikke foreneligt med EU-retten (LSR/Skattestyrelsen 2023). Det afgørende er om grunden er bebygget på overdragelsestidspunktet.
SKAT: Afskrivning på erhvervsbygninger: 4% lineært (AL § 14). Ejendomsavance: ejendomsavancebeskatningsloven (EBL). Moms og skat løber uafhængigt (reguleringsperiode 10 år vs. skattemæssig afskrivning).

SME-ORDNING (fra 1.1.2025, ML §§ 48a-48e, direktiv 2020/285):
Virksomheder med under EUR 100.000 samlet EU-omsætning og under det pågældende lands nationale tærskel kan undgå momsregistrering i andre EU-lande. Kræver forhåndsanmeldelse og EX-registreringsnummer fra etableringslandet.

OSS/ONE-STOP-SHOP (ML §§ 66a-66e):
Fjernsalg til EU-private: Grænse EUR 10.000 samlet. Over grænsen: moms i forbrugerens land. EU-ordning, Import-OSS/IOSS (varer fra 3. lande under EUR 150), Ikke-EU-ordning. Kvartalsvis (EU/ikke-EU) eller månedlig (IOSS) indberetning.

FAKTURAKRAV (ML § 52a, MB §§ 58-81):
Fuld faktura: fortløbende nummer, udstedelsesdato, sælgers navn/adresse/CVR (+landekode ved EU-handel), købers navn/adresse, leverancens art/omfang/pris, momsbeløb ELLER "moms udgør 20% af totalbeløbet", leveringsdato hvis forskellig fra udstedelse, momsgrundlag/enhedspris ekskl. moms, gældende momssats (25%).
EU-handel: købers momsnummer + "zero-rated"/"free of VAT" (varer) eller "omvendt betalingspligt"/"reverse charge" (ydelser).
Forenklet faktura (MB § 63): tilladt under 3.000 kr. ekskl. moms — ikke krav om købers navn/adresse.

EU-HANDEL:
EU-varekøb: Erhvervelsesmoms selvangives i rubrik A og felt "Moms af varekøb i udlandet".
EU-varesalg momsfrit ved: (1) gyldigt momsnummer verificeret i VIES (materiel betingelse, ikke blot formel), (2) to uafhængige transportbeviser (MF art. 45a), (3) korrekt EU-listeindberetning inden fristen.
Import: Importmoms afregnes over momsangivelsen. Told er IKKE fradragsberettiget.
Ydelser B2B: Leveringssted = købers land — omvendt betalingspligt. Faktura uden moms med "reverse charge".
Transportydelser (styresignal juni 2021): Momsfritagelse kræver direkte levering til afsender/modtager af varen. Underleverandørers ydelser til transportøren er momspligtige.

ANGIVELSE OG BETALING (ML §§ 57-62):
Under 5 mio. kr./år: halvårlig, frist 1. i 3. måned efter periodens udløb.
5-50 mio. kr./år: kvartalsvis, frist 1. i 3. måned efter kvartalets udløb.
Over 50 mio. kr./år: månedlig, frist 25. i den følgende måned.
JUNI-UNDTAGELSE: Momsen for juni angives og betales 17. august (ikke 25. juli).
Bankdagsreglen: Fristen udskydes til næste bankdag ved weekend/helligdag.
Nyregistrerede: Kvartalsvis som udgangspunkt. Månedlig hvis forventet omsætning >55 mio. kr.

RENTER (OKL § 7):
Renter påløber fra den ORDINÆRE BETALINGSFRIST for den pågældende indberetningsperiode — ikke fra påkrav. Gælder alle korrektioner inkl. endelig pro-rata-opgørelse. Vedtaget ved lov nr. 832 af 14. juni 2022.

FORÆLDELSE (SFL §§ 31-32):
Ordinær: 3 år fra angivelsesfristens udløb. Absolut: 10 år. Ekstraordinær genoptagelse ved praksisændring (SKM/dom/EU-dom) eller svig.

TAB PÅ DEBITORER (ML § 27, stk. 6):
Konstaterede tab: konkurs/dødsbo, tvangsakkord, forgæves fogedforretning, insolvenserklæring, betalingsevnevurdering med tilstrækkelig inddrivelse, tvangsauktion. Kun den oprindelige leverandør kan fratrække. Intet fradrag for forventede tab.

INVESTERINGSGODER (ML §§ 43-44, MB §§ 43-50):
Over 100.000 kr. ekskl. moms. Reguleringsperiode: 5 år (maskiner/inventar/software), 10 år (fast ejendom og til-/ombygning). Regulering ved ændret anvendelse (min. 10%-point). Fra 1.7.2021: udtagningsmoms ved overgang til fuld momsfritaget anvendelse beregnet på markedsværdi.

LØNSUMSAFGIFT (LSAL, bek. 1079/2023):
Metode 1 (finansielle: banker, forsikring): 15,3% af lønsum + overskud.
Metode 2 (blandet momspligtig/momsfri): 6,37% × lønsum × momsfri andel — koordineres med pro-rata.
Metode 3 (dagblade, aviser): 3,54% af lønsum.
Metode 4 (øvrige: læger, skoler, kulturelle institutioner): 6,37% af lønsum.

// ── SIKKERHED: Rate limiting, timeout og input-sanitering ─────────────────────
const _rateMap = {};
function rateLimit(key, maxKald, periodeMs) {
  const nu = Date.now();
  if (!_rateMap[key]) _rateMap[key] = [];
  _rateMap[key] = _rateMap[key].filter(t => nu - t < periodeMs);
  if (_rateMap[key].length >= maxKald) return false;
  _rateMap[key].push(nu);
  return true;
}

async function sikkerFetch(url, options, timeoutMs = 30000) {
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(tid);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res;
  } catch (e) {
    clearTimeout(tid);
    if (e.name === "AbortError") throw new Error("Anmodningen tog for lang tid. Prøv igen.");
    throw e;
  }
}

function saniterTekst(str, maxLen = 2000) {
  if (typeof str !== "string") return "";
  return str.replace(/[<>]/g, "").trim().slice(0, maxLen);
}

function validerCVR(cvr) {
  const cleaned = String(cvr).replace(/\D/g, "");
  return /^\d{8}$/.test(cleaned) ? cleaned : null;
}

const MAX_FIL_BYTES = 10 * 1024 * 1024; // 10 MB
const TILLADTE_TYPER = ["application/pdf","application/vnd.openxmlformats-officedocument.spreadsheetml.sheet","application/vnd.ms-excel","text/csv"];
const TILLADTE_EXT  = [".pdf",".xlsx",".xls",".csv"];

function validerFil(fil) {
  if (fil.size > MAX_FIL_BYTES) return `Filen "${fil.name}" er for stor (max 10 MB).`;
  const ext = fil.name.toLowerCase().slice(fil.name.lastIndexOf("."));
  if (!TILLADTE_EXT.includes(ext) && !TILLADTE_TYPER.includes(fil.type))
    return `Filtype ikke tilladt: ${fil.name}. Kun PDF, Excel og CSV.`;
  return null;
}

              <div style={{padding:"16px",minHeight:"260px",display:"flex",flexDirection:"column",gap:"10px",background:"#f8f7f5"}}>

                  <div style={{alignSelf:"flex-end",maxWidth:"85%"}}>
                    <div style={{background:"#0c1f35",color:"#fff",borderRadius:"16px 16px 4px 16px",padding:"10px 14px",fontSize:"13px",lineHeight:1.5}}>

                    </div>
                  </div>
                )}

                {/* Tænke-animation */}
                {fase === "thinking" && (
                  <div style={{alignSelf:"flex-start",background:"#fff",border:"0.5px solid #e0dbd4",borderRadius:"4px 16px 16px 16px",padding:"12px 16px"}}>
                    <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
                      {[0,1,2].map(d=>(

                      ))}
                    </div>
                  </div>
                )}

                {/* Svar */}
                {(fase === "svar" || fase === "pause") && svarTekst && (
                  <div style={{alignSelf:"flex-start",maxWidth:"90%",background:"#fff",border:"0.5px solid #e0dbd4",borderRadius:"4px 16px 16px 16px",padding:"12px 16px"}}>
                    {fmtSvar(svarTekst)}

              </div>

              {/* Input boks */}
              <div style={{padding:"10px 12px",background:"#fff",borderTop:"0.5px solid #e0dbd4",display:"flex",gap:"8px",alignItems:"center"}}>
                <div style={{flex:1,background:"#f8f7f5",border:"0.5px solid #ddd",borderRadius:"8px",padding:"8px 12px",fontSize:"12px",color:"#aaa"}}>

              </div>
            </div>

            {/* Pause/play knap */}
            <button
              onClick={()=>setKorer(k=>!k)}
              style={{position:"absolute",bottom:"12px",right:"12px",background:"rgba(255,255,255,0.9)",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:"20px",padding:"4px 12px",fontSize:"11px",cursor:"pointer",color:"#666",display:"flex",alignItems:"center",gap:"5px"}}
            >
              {korer ? "⏸ Pause" : "▶ Afspil"}
            </button>

            {/* Sekvens-indikator */}
            <div style={{display:"flex",justifyContent:"center",gap:"6px",marginTop:"12px"}}>
              {DEMO_SEKVENSER.map((_,i)=>(
                <div key={i} onClick={()=>{setSekvens(i);setTypetTekst("");setSvarTekst("");setSvarIndex(0);setFase("intro");setKorer(true);}}

              ))}
            </div>
          </div>
        </div>
      </div>

      <style>{`
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      `}</style>
    </div>
  );
}

const PRO_TOKEN_KEY = "mr_pro_token";

function gemToken(token) {
  localStorage.setItem(PRO_TOKEN_KEY, token);
}
function hentGemtToken() {
  return localStorage.getItem(PRO_TOKEN_KEY) || "";
}
function sletToken() {
  localStorage.removeItem(PRO_TOKEN_KEY);
}

function ProGate({ side, children }) {
  const [status, setStatus] = useState("tjekker"); // tjekker | låst | åben
  const [brugernavn, setBrugernavn] = useState("");
  const [email, setEmail] = useState("");
  const [fejl, setFejl] = useState("");
  const [loading, setLoading] = useState(false);

  // Tjek eksisterende token ved load
  useEffect(() => {
    const token = hentGemtToken();
    if (!token) { setStatus("låst"); return; }
    fetch("/api/verify", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ token })
    })
    .then(r => r.json())
    .then(data => {
      if (data.gyldig) {
        setBrugernavn(data.navn || data.email || "");
        setStatus("åben");
      } else {
        sletToken();
        setStatus("låst");
        if (data.årsag) setFejl(data.årsag);
      }
    })
    .catch(() => { sletToken(); setStatus("låst"); });
  }, []);

  const logInd = async () => {
    const renset = email.trim().toLowerCase();
    if (!renset || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(renset)) {
      setFejl("Indtast en gyldig email-adresse."); return;
    }
    setLoading(true); setFejl("");
    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email: renset })
      });
      const data = await res.json();
      if (data.ok && data.token) {
        gemToken(data.token);
        setBrugernavn(data.navn || renset.split("@")[0]);
        setStatus("åben");
      } else {
        setFejl(data.fejl || "Login mislykkedes. Prøv igen.");
      }
    } catch {
      setFejl("Netværksfejl. Tjek din forbindelse og prøv igen.");
    }
    setLoading(false);
  };

  // Indlæser
  if (status === "tjekker") return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"40vh",flexDirection:"column",gap:"1rem"}}>
      <div style={{width:"36px",height:"36px",border:`3px solid ${C.border}`,borderTop:`3px solid ${C.gold}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <div style={{fontSize:"13px",color:C.textSub}}>Verificerer adgang...</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  // Adgang godkendt
  if (status === "åben") return (
    <div>
      <div style={{background:"rgba(12,31,53,0.97)",borderBottom:"0.5px solid rgba(196,151,62,0.2)",padding:"6px 2rem",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:"12px"}}>
        <span style={{background:"rgba(196,151,62,0.15)",color:C.gold,border:"0.5px solid rgba(196,151,62,0.4)",borderRadius:"12px",padding:"2px 10px",fontSize:"10px",fontWeight:700,letterSpacing:"0.5px"}}>PRO</span>
        <span style={{color:"rgba(255,255,255,0.5)",fontSize:"11px"}}>{brugernavn}</span>
        <button onClick={()=>{sletToken();setStatus("låst");setEmail("");setFejl("");}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:"11px",cursor:"pointer",padding:"2px 8px"}}>Log ud</button>
      </div>
      {children}
    </div>
  );

  // Login-skærm
  return (
    <div style={{maxWidth:"500px",margin:"0 auto",padding:"5rem 2rem",textAlign:"center"}}>
      <div style={{width:"72px",height:"72px",borderRadius:"50%",background:"linear-gradient(135deg,rgba(196,151,62,0.2),rgba(196,151,62,0.05))",border:"1.5px solid rgba(196,151,62,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"30px",margin:"0 auto 1.5rem"}}>
        🔐
      </div>

      <div style={{display:"inline-block",background:"rgba(196,151,62,0.12)",color:C.gold,border:"0.5px solid rgba(196,151,62,0.35)",borderRadius:"20px",padding:"3px 14px",fontSize:"11px",fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:"1rem"}}>
        PRO · Kun for abonnenter
      </div>

      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.8rem",fontWeight:700,color:C.navy,marginBottom:"0.75rem",lineHeight:1.2}}>
        {side==="chat" ? "Moms & Skat AI-rådgiver" : "Moms & Skat Compliance"}
      </h2>

      <p style={{color:C.textSub,fontSize:"14px",lineHeight:1.7,marginBottom:"2rem",maxWidth:"380px",margin:"0 auto 2rem"}}>
        {side==="chat"
          ? "AI-rådgiveren er forbeholdt betalende kunder. Log ind med den email du brugte ved tilmelding."
          : "Compliance-analysen er forbeholdt betalende kunder. Log ind med den email du brugte ved tilmelding."}
      </p>

      {/* Hvad PRO inkluderer */}
      <div style={{background:C.bgSecondary,border:`0.5px solid ${C.border}`,borderRadius:"12px",padding:"1.25rem",marginBottom:"2rem",textAlign:"left"}}>
        <div style={{fontSize:"12px",fontWeight:700,color:C.navy,marginBottom:"10px",textTransform:"uppercase",letterSpacing:"0.5px"}}>PRO inkluderer</div>
        {(side==="chat"
          ? ["Ubegrænset AI-rådgivning om moms og skat","Svar baseret på 17+ retskilder inkl. seneste lovgivning","Konkrete §-henvisninger til ML, LL, SEL og DJV","Moms/skat asymmetri-analyse"]
          : ["CVR-opslag og automatisk virksomhedsdata","AI compliance-analyse for moms og skat","Upload saldobalance — spot fejl konkret","Print-klar rapport med prioriterede anbefalinger"]
        ).map(t=>(
          <div key={t} style={{display:"flex",gap:"8px",alignItems:"center",padding:"4px 0"}}>
            <span style={{color:C.green,fontSize:"14px",flexShrink:0}}>✓</span>
            <span style={{fontSize:"13px",color:C.textSub}}>{t}</span>
          </div>
        ))}
      </div>

      {/* Login-formular */}
      <div style={{background:C.bgCard,border:`0.5px solid ${C.border}`,borderRadius:"12px",padding:"1.5rem",marginBottom:"1.5rem"}}>
        <div style={{fontSize:"13px",fontWeight:600,color:C.navy,marginBottom:"12px"}}>Log ind med din email</div>
        <input
          type="email"
          value={email}
          onChange={e=>{setEmail(e.target.value);setFejl("");}}
          onKeyDown={e=>e.key==="Enter"&&logInd()}
          placeholder="din@email.dk"
          style={{width:"100%",padding:"11px 14px",borderRadius:"8px",border:`1.5px solid ${fejl?C.red:C.borderMid}`,background:C.bgSecondary,color:C.text,fontSize:"14px",marginBottom:"10px",boxSizing:"border-box"}}
        />
        <button onClick={logInd} disabled={loading} style={{width:"100%",background:loading?"#aaa":C.navy,color:C.white,border:"none",padding:"12px",borderRadius:"8px",fontWeight:700,fontSize:"14px",cursor:loading?"default":"pointer",fontFamily:"Georgia,serif",transition:"all 0.15s"}}>
          {loading ? "⏳ Logger ind..." : "Log ind →"}
        </button>
        {fejl && <div style={{marginTop:"10px",fontSize:"13px",color:C.red,display:"flex",gap:"6px",alignItems:"flex-start",textAlign:"left"}}>⚠️ {fejl}</div>}
      </div>

      <div style={{fontSize:"13px",color:C.textSub,lineHeight:1.7}}>
        Ikke abonnent endnu?{" "}
        <button onClick={()=>window.dispatchEvent(new CustomEvent("navigate",{detail:"kontakt"}))} style={{background:"none",border:"none",color:C.gold,fontWeight:700,cursor:"pointer",fontSize:"13px",textDecoration:"underline",padding:0}}>
          Kontakt os her
        </button>
      </div>
    </div>
  );
}

function Chat() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,loading]);

  const send = async (text) => {
    const raa = text || input.trim();
    const msg = saniterTekst(raa, 1000);
    if (!msg || loading) return;
    if (!rateLimit("chat", 10, 60000)) {
      setMessages(prev=>[...prev,{role:"assistant",content:"⚠️ Du har stillet mange spørgsmål på kort tid. Vent et øjeblik og prøv igen."}]);
      return;
    }
    setInput("");
    setLoading(true);
    const newMsgs = [...messages,{role:"user",content:msg}];
    setMessages(newMsgs);
    try {
      const res = await sikkerFetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:AI_KNOWLEDGE,messages:newMsgs})
      }, 30000);
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Beklager, teknisk fejl. Prøv igen.";
      setMessages([...newMsgs,{role:"assistant",content:reply}]);
    } catch(e) {
      setMessages([...newMsgs,{role:"assistant",content:"⚠️ " + (e.message || "Teknisk fejl. Prøv igen.")}]);
    } finally { setLoading(false); }
  };

  const fmtMsg = (text) => text.split("\n").map((l,i)=>{
    if(!l.trim()) return <br key={i}/>;
    return <p key={i} style={{margin:"3px 0",lineHeight:1.65}}>{l}</p>;
  });

  return (
    <div style={{maxWidth:"860px",margin:"0 auto",padding:"2rem 1.5rem"}}>
      <SectionHeader title="Moms AI-rådgiver"/>
      <p style={{color:C.textSub,fontSize:"14px",marginBottom:"1.5rem"}}>

      </p>
      <div style={{borderRadius:"16px",overflow:"hidden",boxShadow:"0 8px 40px rgba(12,31,53,0.12),0 2px 8px rgba(12,31,53,0.06)"}}>
        <div style={{background:"linear-gradient(135deg,#0c1f35,#1a3558)",padding:"1.25rem 1.5rem",display:"flex",alignItems:"center",gap:"12px",borderRadius:"16px 16px 0 0"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px rgba(34,197,94,0.6)"}}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",color:C.white,fontWeight:600,fontSize:"15px"}}>Moms & Skat AI-rådgiver</div>
            <div style={{color:"rgba(255,255,255,0.45)",fontSize:"11px",letterSpacing:"0.05em"}}>ML · MB · MF · LL · SEL · DJV · Retspraksis</div>
          </div>
          <div style={{fontSize:"10px",color:"rgba(196,151,62,0.7)",background:"rgba(196,151,62,0.08)",border:"1px solid rgba(196,151,62,0.2)",borderRadius:"100px",padding:"3px 10px",letterSpacing:"0.06em",fontWeight:600}}>LIVE</div>
        </div>
        <div style={{background:C.bgCard,minHeight:"420px",maxHeight:"500px",overflowY:"auto",padding:"1.5rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
          {messages.length===0 && (
            <div style={{textAlign:"center",margin:"auto",padding:"2rem 0"}}>
              <div style={{fontSize:"40px",marginBottom:"0.75rem"}}>⚖️</div>

          )}
          {messages.map((m,i)=>(

function Perioder() {
  const [aktivTab, setAktivTab] = useState("moms");
  const y = 2026;
  const fmt = d => d.toLocaleDateString("da-DK",{day:"numeric",month:"short",year:"numeric"});
  const today = new Date(); today.setHours(0,0,0,0);

  const status = frist => {
    const due = new Date(frist); due.setHours(0,0,0,0);
    const d = Math.floor((due - today) / 86400000);
    if (d < 0)  return {lbl:"Udløbet",     c:C.red,    bg:"rgba(239,68,68,0.1)"};
    if (d <= 14) return {lbl:`${d} dage`,  c:C.yellow, bg:"rgba(245,158,11,0.1)"};
    return           {lbl:`${d} dage`,     c:C.green,  bg:"rgba(34,197,94,0.1)"};
  };

  // ── HJÆLPEFUNKTIONER — skal defineres FØR de bruges ──
  const næsteMaanedFrist = (dag) => {
    const d = new Date(today);
    d.setDate(dag);
    if (d <= today) { d.setMonth(d.getMonth() + 1); d.setDate(dag); }
    return d;
  };
  const næsteKvartalFrist = (dag) => {
    const kvartalSlut = [2,5,8,11];
    for (const mdr of kvartalSlut) {
      const frist = new Date(y, mdr, dag);
      if (frist > today) return frist;
    }
    return new Date(y+1, 2, dag);
  };
  const næsteKvartalMomsFrist = () => {
    const frister = [new Date(y,5,1),new Date(y,8,1),new Date(y,11,1),new Date(y+1,2,1)];
    return frister.find(f=>f>today) || frister[frister.length-1];
  };

  // ── MOMS ──
  const momsData = {
    halvaar: [
      {p:`1. halvår ${y}`, fra:new Date(y,0,1), til:new Date(y,5,30), frist:new Date(y,8,1)},
      {p:`2. halvår ${y}`, fra:new Date(y,6,1), til:new Date(y,11,31),frist:new Date(y+1,2,1)},
    ],
    kvartal: [
      {p:`1. kvartal ${y}`, fra:new Date(y,0,1), til:new Date(y,2,31), frist:new Date(y,5,1)},
      {p:`2. kvartal ${y}`, fra:new Date(y,3,1), til:new Date(y,5,30), frist:new Date(y,8,1)},

// ── BEREGNER ──────────────────────────────────────────────────────────────────
function Beregner() {
  const [beloeb, setBeloeb] = useState("");
  const [retning, setRetning] = useState("tilfoej");
  const [sats, setSats] = useState("25");

  const num = parseFloat(beloeb.replace(",",".")) || 0;
  const pct = parseFloat(sats)/100;
  const momsBeloeb = retning==="tilfoej" ? num*pct : num-num/(1+pct);
  const ekskl = retning==="tilfoej" ? num : num/(1+pct);
  const inkl = retning==="tilfoej" ? num*(1+pct) : num;
  const fmt2 = n=>n.toLocaleString("da-DK",{minimumFractionDigits:2,maximumFractionDigits:2});

  const inp = {padding:"11px 14px",borderRadius:"10px",border:`1px solid ${C.border}`,background:C.bgCard,color:C.text,fontSize:"15px",width:"100%",boxShadow:"0 1px 3px rgba(12,31,53,0.05)",outline:"none",transition:"border-color 0.15s"};

  return (
    <div style={{maxWidth:"900px",margin:"0 auto",padding:"3rem 2rem"}}>
      <SectionHeader title="Momsberegner"/>
      <p style={{color:C.textSub,marginBottom:"2rem",lineHeight:1.7}}>Beregn moms hurtigt og nemt — angiv beløbet, vælg retning og momssats.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2rem",marginBottom:"2rem"}}>
        <div style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
          <div>
            <label style={{display:"block",fontSize:"12px",fontWeight:700,color:C.textSub,marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Beløb (kr.)</label>
            <input type="number" placeholder="Fx 10000" value={beloeb} onChange={e=>setBeloeb(e.target.value)} style={inp}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:"12px",fontWeight:700,color:C.textSub,marginBottom:"8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Beregningsretning</label>
            <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              {[["tilfoej","➕ Læg moms til"],["fratræk","➖ Træk moms fra"]].map(([v,l])=>(
                <button key={v} onClick={()=>setRetning(v)} style={{padding:"9px 16px",borderRadius:"8px",border:`1.5px solid ${retning===v?C.navy:C.borderMid}`,background:retning===v?C.navy:C.bgSecondary,color:retning===v?C.white:C.text,cursor:"pointer",fontSize:"14px",transition:"all 0.15s"}}>{l}</button>
              ))}
            </div>
            <p style={{margin:"6px 0 0",fontSize:"12px",color:C.textSub}}>{retning==="tilfoej"?"Du angiver ekskl. moms — beregner inkl. moms.":"Du angiver inkl. moms — beregner momsandelen."}</p>
          </div>
          <div>
            <label style={{display:"block",fontSize:"12px",fontWeight:700,color:C.textSub,marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Momssats</label>
            <select value={sats} onChange={e=>setSats(e.target.value)} style={inp}>
              <option value="25">25% — Standard dansk moms</option>
              <option value="0">0% — Momsfrit / nulmoms</option>
            </select>
          </div>
        </div>
        <Card>
          <div style={{fontSize:"12px",fontWeight:700,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"1rem"}}>Resultat</div>
          {num>0 ? (
            <>
              {[["Beløb ekskl. moms",fmt2(ekskl)],["Moms ("+sats+"%)",fmt2(momsBeloeb)]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`0.5px solid ${C.border}`}}>
                  <span style={{fontSize:"14px",color:C.textSub}}>{l}</span>
                  <span style={{fontWeight:600}}>{v} kr.</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 4px"}}>
                <span style={{fontWeight:700,fontSize:"15px"}}>Beløb inkl. moms</span>
                <span style={{fontSize:"26px",fontWeight:700,color:C.navy}}>{fmt2(inkl)} kr.</span>
              </div>
              <div style={{marginTop:"1rem",background:"rgba(196,151,62,0.06)",border:"1px solid rgba(196,151,62,0.2)",borderRadius:"10px",padding:"11px 16px",fontSize:"12px",color:C.textSub,lineHeight:1.6}}>
                <strong style={{color:C.gold}}>Tip:</strong> {sats==="25"?"Moms udgør altid 20% af det samlede beløb inkl. moms.":"Ingen moms ved 0%-sats."}
              </div>
            </>
          ) : (
            <div style={{textAlign:"center",padding:"2rem 0",color:C.textSub}}>
              <div style={{fontSize:"36px",marginBottom:"0.5rem"}}>🧮</div>
              Angiv et beløb for at se resultatet
            </div>
          )}
        </Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"1rem"}}>
        {[
          ["Ekskl. → Inkl.","Beløb × 1,25","10.000 × 1,25 = 12.500 kr."],
          ["Inkl. → Ekskl.","Beløb ÷ 1,25","12.500 ÷ 1,25 = 10.000 kr."],
          ["Isoler momsbeløbet","Beløb inkl. × 0,20","12.500 × 0,20 = 2.500 kr."],
          ["Moms af ekskl.","Beløb ekskl. × 0,25","10.000 × 0,25 = 2.500 kr."],
        ].map(([ti,fo,ex])=>(
          <Card key={ti}>
            <div style={{fontSize:"12px",fontWeight:700,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}}>{ti}</div>
            <div style={{fontSize:"20px",fontWeight:700,color:C.navy,fontFamily:"monospace",marginBottom:"4px"}}>{fo}</div>
            <div style={{fontSize:"12px",color:C.textSub}}>{ex}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function Momstraening() {
  const [aktivtModul, setAktivtModul] = useState(null);
  const [aktivLektion, setAktivLektion] = useState(0);
  const [fase, setFase] = useState("laes"); // laes | quiz | resultat
  const [svar, setSvar] = useState({});
  const [gennemfoert, setGennemfoert] = useState({});

  const modul = aktivtModul !== null ? MODULER[aktivtModul] : null;
  const lektion = modul ? modul.lektioner[aktivLektion] : null;

  const startQuiz = () => { setSvar({}); setFase("quiz"); };

  const vælgSvar = (qi, si) => {
    if (svar[qi] !== undefined) return;
    setSvar(prev => ({...prev, [qi]: si}));
  };

  const afslutQuiz = () => {
    const score = lektion.quiz.filter((q,i) => svar[i] === q.k).length;
    const key = `${aktivtModul}-${aktivLektion}`;
    setGennemfoert(prev => ({...prev, [key]: score}));
    setFase("resultat");
  };

  const nesteLektion = () => {
    if (aktivLektion < modul.lektioner.length - 1) {
      setAktivLektion(aktivLektion + 1);
      setFase("laes");
      setSvar({});
    } else {
      setAktivtModul(null);
      setAktivLektion(0);
      setFase("laes");
    }
  };

  const fremgang = () => {
    let total = 0, done = 0;
    MODULER.forEach((m,mi) => m.lektioner.forEach((_,li) => {
      total++;
      if (gennemfoert[`${mi}-${li}`] !== undefined) done++;
    }));
    return Math.round((done/total)*100);
  };

  const totalLektioner = MODULER.reduce((s,m)=>s+m.lektioner.length,0);
  const altFaerdig = fremgang() === 100;
  const [bevisNavn, setBevisNavn] = useState("");

  const [visBevis, setVisBevis] = useState(false);

    setVisBevis(true);
    // Giv React tid til at rendere bevis-overlay, så print virker korrekt
    setTimeout(() => window.print(), 300);

    @media print {
      body > * { display: none !important; }
      #bevis-print { display: flex !important; }
    }
    @media screen {
      #bevis-print { display: none; }
    }

  // Oversigt
  if (aktivtModul === null) return (

          <div style={{fontSize:"13px",color:C.textSub,lineHeight:1.65}}>

      <div style={{background:"rgba(196,151,62,0.08)",border:"0.5px solid rgba(196,151,62,0.3)",borderRadius:"10px",padding:"14px 18px",marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:"16px",flexWrap:"wrap"}}>

          <strong style={{color:C.gold}}>Din fremgang</strong> — {fremgang()}% gennemført
        </div>
        <div style={{width:"200px",height:"8px",background:C.bgSecondary,borderRadius:"4px",overflow:"hidden"}}>
          <div style={{width:`${fremgang()}%`,height:"100%",background:C.gold,borderRadius:"4px",transition:"width 0.5s"}}/>
        </div>
        <div style={{fontWeight:700,color:C.gold,fontSize:"15px"}}>{fremgang()}%</div>
      </div>

      {/* Kursusbevis-banner */}
      {altFaerdig && (
        <div style={{background:"linear-gradient(135deg,#0c1f35 0%,#1a3558 100%)",border:`1.5px solid ${C.gold}`,borderRadius:"14px",padding:"2rem",marginBottom:"2rem",textAlign:"center",position:"relative",overflow:"hidden"}}>

          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",fontWeight:700,color:C.white,marginBottom:"6px"}}>

              onKeyDown={e=>e.key==="Enter"&&bevisNavn.trim()&&genererBevis()}

              onClick={genererBevis}
              disabled={!bevisNavn.trim()}
              style={{background:bevisNavn.trim()?C.gold:"rgba(196,151,62,0.25)",color:bevisNavn.trim()?C.navy:"rgba(255,255,255,0.3)",border:"none",padding:"10px 22px",borderRadius:"8px",fontWeight:700,fontSize:"14px",cursor:bevisNavn.trim()?"pointer":"default",fontFamily:"Georgia,serif",transition:"all 0.2s",whiteSpace:"nowrap"}}

            <div key={m.id} onClick={()=>{setAktivtModul(mi);setAktivLektion(0);setFase("laes");}} style={{background:C.bgCard,border:`0.5px solid ${C.border}`,borderRadius:"12px",padding:"1.5rem",cursor:"pointer",transition:"all 0.15s",position:"relative",overflow:"hidden"}}>

              <p style={{fontSize:"13px",color:C.textSub,lineHeight:1.6,marginBottom:"1rem"}}>{m.intro}</p>

              <p style={{fontSize:"13px",color:C.textSub,lineHeight:1.6,margin:0}}>{lektion.eksempel}</p>
            </div>
            <button onClick={startQuiz} style={{background:C.navy,color:C.white,border:"none",padding:"12px 28px",borderRadius:"8px",fontWeight:700,fontSize:"15px",cursor:"pointer"}}>Tag quiz →</button>
          </>
        )}

        {fase === "quiz" && (
          <>
            <div style={{fontWeight:700,fontSize:"16px",marginBottom:"1.25rem",color:C.navy}}>Test din viden 🧠</div>
            {lektion.quiz.map((q,qi)=>(
              <div key={qi} style={{marginBottom:"1.5rem"}}>
                <div style={{fontWeight:600,fontSize:"14px",marginBottom:"0.75rem"}}>{qi+1}. {q.sp}</div>
                <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                  {q.sv.map((s,si)=>{
                    const valgt = svar[qi] === si;
                    const rigtigt = si === q.k;
                    const visResultat = svar[qi] !== undefined;
                    let bg = C.bgSecondary, border = C.borderMid, color = C.text;
                    if (visResultat && rigtigt) { bg="rgba(34,197,94,0.12)"; border=C.green; color=C.green; }
                    else if (visResultat && valgt && !rigtigt) { bg="rgba(239,68,68,0.1)"; border=C.red; color=C.red; }
                    return (
                      <button key={si} onClick={()=>vælgSvar(qi,si)} style={{padding:"10px 14px",borderRadius:"8px",border:`1.5px solid ${border}`,background:bg,color,cursor:visResultat?"default":"pointer",textAlign:"left",fontSize:"14px",fontFamily:"Georgia,serif",transition:"all 0.15s"}}>
                        {visResultat && rigtigt && "✓ "}{visResultat && valgt && !rigtigt && "✗ "}{s}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
            {Object.keys(svar).length === lektion.quiz.length && (
              <button onClick={afslutQuiz} style={{background:C.gold,color:C.navy,border:"none",padding:"12px 28px",borderRadius:"8px",fontWeight:700,fontSize:"15px",cursor:"pointer",marginTop:"0.5rem"}}>Se resultat →</button>
            )}
          </>
        )}

        {fase === "resultat" && (()=>{
          const score = lektion.quiz.filter((q,i)=>svar[i]===q.k).length;
          const total = lektion.quiz.length;
          const pct = Math.round((score/total)*100);
          return (
            <>
              <div style={{textAlign:"center",padding:"1.5rem 0"}}>
                <div style={{fontSize:"52px",marginBottom:"0.5rem"}}>{pct===100?"🏆":pct>=50?"👍":"📚"}</div>
                <div style={{fontSize:"26px",fontWeight:700,color:pct===100?C.green:pct>=50?C.gold:C.red,marginBottom:"6px"}}>{score}/{total} rigtige</div>
                <div style={{fontSize:"14px",color:C.textSub,marginBottom:"1.5rem"}}>{pct===100?"Perfekt! Du har styr på dette emne.":pct>=50?"Godt klaret! Læs evt. lektionen igen for at fange de sidste detaljer.":"Prøv at læse lektionen igen — det sidder snart."}</div>
                <div style={{display:"flex",gap:"1rem",justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={()=>setFase("laes")} style={{background:C.bgSecondary,color:C.text,border:`0.5px solid ${C.borderMid}`,padding:"10px 22px",borderRadius:"8px",cursor:"pointer",fontSize:"14px",fontFamily:"Georgia,serif"}}>← Læs igen</button>
                  <button onClick={nesteLektion} style={{background:C.navy,color:C.white,border:"none",padding:"10px 22px",borderRadius:"8px",fontWeight:700,cursor:"pointer",fontSize:"14px",fontFamily:"Georgia,serif"}}>{aktivLektion < modul.lektioner.length-1 ? "Næste lektion →" : "Tilbage til oversigt →"}</button>
                </div>
              </div>
            </>
          );
        })()}
      </Card>
    </div>
  );
}

function MomsCompliance() {
  const [fase, setFase] = useState("start"); // start | cvr | analyse | upload | rapport
  const [cvr, setCvr] = useState("");
  const [cvrData, setCvrData] = useState(null);
  const [cvrLoading, setCvrLoading] = useState(false);
  const [cvrFejl, setCvrFejl] = useState("");
  const [aiAnalyse, setAiAnalyse] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [filer, setFiler] = useState([]);
  const [filAnalyse, setFilAnalyse] = useState("");
  const [filLoading, setFilLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const filRef = useRef(null);

  // ── CVR opslag via Claude AI med web_search ──
  const slaOpCVR = async () => {
    const cleaned = validerCVR(cvr);
    if (!cleaned) { setCvrFejl("CVR-nummer skal være præcis 8 cifre."); return; }
    if (!rateLimit("cvr", 5, 120000)) { setCvrFejl("For mange opslag. Vent et øjeblik og prøv igen."); return; }
    setCvrFejl(""); setCvrLoading(true); setCvrData(null); setAiAnalyse("");
    try {
      const res = await sikkerFetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          tools: [{"type":"web_search_20250305","name":"web_search"}],
          messages: [{role:"user", content: "Slå CVR-nummer " + cleaned + " op på cvr.dk eller virk.dk og returner som JSON og KUN JSON uden forklaring:\n{\"navn\":\"...\",\"cvr\":\"" + cleaned + "\",\"status\":\"AKTIV eller OPHØRT\",\"branche\":\"...\",\"brancheKode\":\"...\",\"adresse\":\"...\",\"ansatte\":\"...\",\"stiftet\":\"...\",\"ejerform\":\"...\"}"}]
        })
      }, 30000);
      const data = await res.json();
      const tekstBlokke = (data.content||[]).filter(b=>b.type==="text");
      const raaJson = tekstBlokke.map(b=>b.text).join("");
      const jsonMatch = raaJson.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Ingen data fundet");
      const virk = JSON.parse(jsonMatch[0]);
      Object.keys(virk).forEach(k => { virk[k] = saniterTekst(String(virk[k] || ""), 200); });
      virk.cvr = cleaned;
      setCvrData(virk);
      setFase("analyse");
      hentAiAnalyse(virk);
    } catch(e) {
      setCvrFejl("Kunne ikke hente CVR-data. Prøv igen om et øjeblik.");
    }
    setCvrLoading(false);
  };

  // ── AI compliance-analyse baseret på CVR-data ──
  const hentAiAnalyse = async (virk) => {
    setAiLoading(true);
    const ansatteStr = virk.ansatte !== undefined ? String(virk.ansatte) : "ukendt";
    const prompt = "Du er en erfaren dansk moms- og skatterådgiver. Analysér følgende virksomhed og giv en konkret compliance-vurdering for BÅDE moms og skat.\n\n"
      + "VIRKSOMHEDSDATA FRA CVR:\n"
      + "- Navn: " + virk.navn + "\n"
      + "- CVR: " + virk.cvr + "\n"
      + "- Status: " + virk.status + "\n"
      + "- Branche: " + virk.branche + " (kode: " + virk.brancheKode + ")\n"
      + "- Adresse: " + virk.adresse + "\n"
      + "- Antal ansatte: " + ansatteStr + "\n"
      + "- Stiftet: " + virk.stiftet + "\n"
      + "- Ejerform: " + virk.ejerform + "\n\n"
      + "Giv en struktureret compliance-analyse med disse 6 afsnit:\n\n"
      + "1. MOMSSTATUS - Er virksomheden momspligtig, momsfritaget eller blandet? Sandsynlig momsperiode? Lønsumsafgiftspligt? (ML § 13, LSAL)\n\n"
      + "2. SKATTEMÆSSIG STATUS - Selskab eller personlig virksomhed? Relevant beskatningsform (SEL, PSL, VSL)? Skattepligtig indkomst og relevante fradrag?\n\n"
      + "3. BRANCHESPECIFIKKE RISICI (moms) - Typiske momsfejl i denne branche? Fradragsbegrænsninger, reverse charge, fast ejendom osv.\n\n"
      + "4. BRANCHESPECIFIKKE RISICI (skat) - Typiske skattemæssige fejl? Afskrivninger, personalegoder (LL § 16), repræsentation (LL § 8), transfer pricing osv.\n\n"
      + "5. SAMSPIL MOMS/SKAT - Hvor er der asymmetri? Hvad giver fradrag i moms men ikke skat (eller omvendt)? Fx biler, repræsentation, etableringsomkostninger.\n\n"
      + "6. TOP 5 ANBEFALINGER - De vigtigste konkrete handlinger virksomheden bør foretage med lovhenvisninger (ML §, LL §, SEL §).\n\n"
      + "Vær konkret og henvis altid til relevante lovparagraffer.";

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{role:"user", content: prompt}]
        })
      });
      const data = await res.json();
      setAiAnalyse(data.content?.[0]?.text || "Analyse ikke tilgængelig.");
    } catch(e) {
      setAiAnalyse("Der opstod en fejl ved AI-analysen. Prøv igen.");
    }
    setAiLoading(false);
  };

  // ── Fil-upload og analyse ──
  const behandlFiler = (nyeFiler) => {
    const fejl = [];
    const gyldige = [];
    Array.from(nyeFiler).forEach(f => {
      const fejlBesked = validerFil(f);
      if (fejlBesked) { fejl.push(fejlBesked); }
      else { gyldige.push({fil:f, navn:f.name, str:(f.size/1024).toFixed(0)+"KB", type:f.name.toLowerCase().endsWith(".pdf")?"PDF":"Excel/CSV"}); }
    });
    if (fejl.length > 0) alert(fejl.join("\n"));
    if (gyldige.length > 0) setFiler(prev => [...prev, ...gyldige]);
  };

  const analyserFiler = async () => {
    if (filer.length === 0) return;
    if (!rateLimit("compliance-fil", 3, 120000)) {
      setFilAnalyse("⚠️ For mange analyser på kort tid. Vent et øjeblik og prøv igen.");
      return;
    }
    setFilLoading(true); setFilAnalyse("");

    const filIndhold = await Promise.all(filer.map(async ({fil, navn, type}) => {
      if (type === "PDF") {
        const b64 = await new Promise(res => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.readAsDataURL(fil);
        });
        return { navn, type, b64, erPdf: true };
      } else {
        const tekst = await new Promise(res => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.readAsText(fil);

        return { navn, type, tekst: tekst.substring(0, 8000), erPdf: false };

    const virksomhedInfo = cvrData ? "Virksomhed: " + saniterTekst(cvrData.navn) + " (CVR: " + cvrData.cvr + "), Branche: " + saniterTekst(cvrData.branche) : "Ukendt virksomhed";

    const content = [];

    try {
      const res = await sikkerFetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content}] })
      }, 60000);
      const data = await res.json();
      setFilAnalyse(data.content?.[0]?.text || "Analyse ikke tilgængelig.");
      setFase("rapport");
    } catch(e) {
      setFilAnalyse("⚠️ " + (e.message || "Teknisk fejl. Prøv igen."));

  return (

      {/* ── Trin-indikator ── */}

            <button onClick={()=>window.dispatchEvent(new CustomEvent("navigate",{detail:"sporg"}))} style={{background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.6)",border:"0.5px solid rgba(255,255,255,0.15)",padding:"11px 30px",borderRadius:"10px",fontSize:"13px",cursor:"pointer",fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>

        </div>

      </div>
    </div>
  );
}

function App() {
