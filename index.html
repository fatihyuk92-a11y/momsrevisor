SENESTE GÆLDENDE LOVGIVNING (pr. 2026):

MOMSRETSKILDER:
1. Momsloven (ML) — Lovbekendtgørelse nr. 1179 af 24. september 2024
2. Momsbekendtgørelsen (MB) — Bekendtgørelse nr. 2246 af 30. november 2021 med ændringer (senest bek. nr. 1053 af 22. juni 2023)
3. Momsforordningen (MF) — Rådets gennemførelsesforordning (EU) nr. 282/2011 med ændringer (1042/2013, 2019/2026, 2022/432)
4. EU's momsdirektiv — Rådets direktiv 2006/112/EF med ændringer inkl. ViDA-pakken (direktiv 2024/522)
5. Den Juridiske Vejledning moms (DJV) — Skattestyrelsens vejledning 2026-1, afsnit D.A.
6. Lønsumsafgiftsloven (LSAL) — Lovbekendtgørelse nr. 1079 af 22. august 2023

SKATTERETSKILDER:
7. Statsskatteloven (SL) — Lovbekendtgørelse nr. 149 af 10. april 1922 (grundlæggende indkomstbegreb, § 4 indtægter, § 6 fradrag)
8. Ligningsloven (LL) — Lovbekendtgørelse nr. 42 af 13. januar 2023 med ændringer. Centrale bestemmelser: LL § 9 (lønmodtagerfradrag), LL § 9B (befordring), LL § 9C (kørselsfradrag), LL § 16 (personalegoder — fri bil, telefon, kost/logi), LL § 16A (maskeret udbytte), LL § 2 (transfer pricing/armslængdeprincippet)
9. Selskabsskatteloven (SEL) — Lovbekendtgørelse nr. 1241 af 22. august 2022 med ændringer. SEL § 1 (skattepligtige selskaber), SEL § 8 (skattepligtig indkomst), SEL § 11-11C (tynd kapitalisering og rentefradragsbegrænsning), SEL § 13 (skattefri udbytter)
10. Personskatteloven (PSL) — Lovbekendtgørelse nr. 1284 af 17. august 2023. PSL § 3 (personlig indkomst), PSL § 4 (kapitalindkomst), PSL § 4a (aktieindkomst)
11. Virksomhedsskatteloven (VSL) — Lovbekendtgørelse nr. 1429 af 9. december 2019. VSL § 1 (virksomhedsordningen), VSL § 22a (kapitalafkastordningen)
12. Afskrivningsloven (AL) — Lovbekendtgørelse nr. 24 af 6. januar 2022. AL § 2 (driftsmidler), AL § 14-25 (bygninger og installationer), AL §§ 40-44 (goodwill og immaterielle aktiver)
13. Kildeskatteloven (KSL) — Lovbekendtgørelse nr. 460 af 31. maj 2024. KSL § 43 (A-indkomst), KSL § 65 (udbytteskat)
14. Kursgevinstloven (KGL) — Lovbekendtgørelse nr. 1209 af 31. august 2020
15. Aktieavancebeskatningsloven (ABL) — Lovbekendtgørelse nr. 172 af 29. januar 2021
16. Skatteforvaltningsloven (SFL) — Lovbekendtgørelse nr. 835 af 3. juni 2022 (forældelse, genoptagelse, klage)
17. Den Juridiske Vejledning skat (DJV) — afsnit C (erhverv), afsnit A (personlig beskatning), afsnit B (selskaber)

SAMSPIL MELLEM MOMS OG SKAT — KRITISKE FORSKELLE:

BILER — moms og skat behandles forskelligt:
- Personbil MOMS: Intet fradrag ved køb og drift (ML § 42) UANSET erhvervsmæssig anvendelse
- Personbil SKAT: Fuldt fradrag for erhvervsmæssige driftsomkostninger. Fri bil beskattes efter LL § 16, stk. 4 (min. 25% af nyvognspris under 300.000 kr. + 20% over 300.000 kr., min. 160.000 kr. pr. år + grøn ejerafgift)
- Varebil MOMS: Op til fuldt fradrag afhængig af anvendelse (ML § 42, stk. 4-5)
- Varebil SKAT: Privat anvendelse beskattes — 20% af varebilens værdi pr. år ved privat brug (LL § 16, stk. 5). Medarbejders egenbetaling reducerer beskatningen

REPRÆSENTATION — asymmetrisk behandling:
- MOMS: Intet fradrag for repræsentation til forretningsforbindelser (ML § 42, stk. 1, nr. 2). Restaurant: kun 1/4 fradrag
- SKAT: 25% fradrag for repræsentationsudgifter (LL § 8, stk. 4) — dvs. 75% ikke fradragsberettiget
- VIGTIGT: Moms og skat giver IKKE samme fradragsprocent — en udgift kan have momsfradrag men begrænset skattefradrag og omvendt

GAVER OG PERSONALEGODER:
- Gaver til forretningsforbindelser MOMS: Intet fradrag (ML § 42, stk. 1, nr. 3)
- Gaver til ansatte SKAT: Skattefri hvis under 1.200 kr./år pr. ansat (2026) — julegave mv. LL § 16
- Reklameartikler under 100 kr. ekskl. moms: Fuldt momsfradrag. Skattemæssigt: fuldt fradrag som reklameudgift
- Jubilæumsgratiale og fratrædelsesgodtgørelse: Særregler i LL § 7 U og § 30

FAST EJENDOM — kompleks sammenkobling:
- MOMS: Udlejning momsfrit som udgangspunkt (ML § 13, stk. 1, nr. 8). Salg af ny bygning/byggegrund momspligtigt
- SKAT: Udlejningsindtægt er skattepligtig. Afskrivning på erhvervsejendomme 4% lineært (AL § 14). Salg: ejendomsavancebeskatningsloven (EBL)
- VIGTIGT SAMSPIL: Moms ved køb af erhvervsejendom kan fratrækkes (ved momspligtig udlejning), men påvirker ikke skattemæssig anskaffelsessum. Momsreguleringsperioden (10 år) og skattemæssig afskrivningsperiode løber uafhængigt

LØN VS. HONORAR — afgørende for moms og skat:
- Lønmodtager: Ingen moms. A-indkomst beskattes med AM-bidrag 8% + indkomstskat
- Selvstændig honorarmodtager: Momspligt (medmindre under 50.000 kr.). B-indkomst. Kan anvende VSO
- VIGTIGT: Sondringen lønmodtager/selvstændig (cirkulære nr. 129 af 4. juli 1994) gælder PARALLELT for moms og skat men vurderes uafhængigt

DRIFTSOMKOSTNINGER — skattemæssigt fradrag (SL § 6a) vs. momsfradrag:
- Generelt: Skattemæssigt fradrag kræver erhvervsmæssig tilknytning. Momsfradrag kræver momspligtig aktivitet
- Dobbelt-tjek altid: Kan udgiften fratrækkes skattemæssigt? Kan momsen fratrækkes? Svarene er IKKE altid ens
- Etableringsomkostninger: SKAT — ikke fradragsberettiget (aktiveringspligt). MOMS — fradragsberettiget ved momsregistrering

AFSKRIVNINGER:
- Driftsmidler SKAT: 25% saldoafskrivning (AL § 5). Straksafskrivning under 32.900 kr. (2026, AL § 6)
- Driftsmidler MOMS: Ingen afskrivning — fuld momsfradrag ved anskaffelsen (hvis momspligtig formål)
- Bygninger SKAT: 4% lineær afskrivning på erhvervsbygninger (AL § 14-17)
- Bygninger MOMS: Ingen afskrivning — reguleringsperiode 10 år

TRANSFER PRICING (LL § 2):
- Transaktioner mellem koncernforbundne selskaber skal ske på armslængdevilkår
- Forkerte afregningspriser kan give skattekorrektion OG momskorrektion
- Dokumentationspligt for virksomheder over visse grænser

UNDERSKUDSFREMFØRSEL (SEL § 12, LL § 15):
- Skattemæssige underskud kan fremføres uden tidsbegrænsning (men max 60% af årets indkomst over 8,7 mio. kr.)
- Ingen tilsvarende "underskud" i momssystemet — negativ moms udbetales løbende

UDBYTTEBESKATNING OG MASKERET UDBYTTE:
- LL § 16A: Udlodninger fra selskab til aktionær beskattes som udbytte (aktieindkomst: 27%/42%)
- Maskeret udbytte: Udgifter afholdt i selskabets navn men til private formål. Dobbelt konsekvens: (1) ikke skattefradrag i selskabet, (2) beskattes som udbytte hos aktionær. MOMS: Eventuelt tilbageføring af momsfradrag

KONKRETE SKAT/MOMS-SAMMENHÆNGE DER OFTE OVERSES:
1. Sponsorater: MOMS — fuldt fradrag som reklame. SKAT — fuldt fradrag som reklame (LL § 8, stk. 1)
2. Kantineordning: MOMS — særregler om kantinemoms (DJV D.A.5.13). SKAT — personalegodebeskatning hvis under markedspris (LL § 16)
3. Sundhedsforsikring: MOMS — ingen fradragsret (LL § 30A skat). SKAT — fradragsberettiget for arbejdsgiver (LL § 30)
4. Hjemmekontor: MOMS — delvis fradrag ved erhvervsmæssig brug. SKAT — fradrag for faktiske udgifter eller standardfradrag
5. Rejseudgifter: MOMS — fuldt fradrag for erhvervsmæssige rejser. SKAT — standardsatser eller faktiske udgifter (LL § 9A)
6. Tab på debitorer: MOMS — fradrag for konstaterede tab (ML § 27, stk. 6). SKAT — fradrag som tab på fordringer (KGL § 17 for erhverv)

MOMS OG SKAT — KERNEREGLER:

MOMS REGISTRERING (ML §§ 47-50): Pligt ved momspligtigt salg over 50.000 kr./kalenderår.
MOMSFRITAGNE AKTIVITETER (ML § 13): Hospitalsbehandling, læge/tandlæge, social forsorg, skoleundervisning, kulturelle aktiviteter, forsikring, finansielle ydelser, fast ejendom (som udgangspunkt). NB: Momsfritagne aktiviteter betaler LØNSUMSAFGIFT og kan have skattemæssige fradragsbegrænsninger.
MOMSFRADRAG (ML §§ 37-42): Pro-rata for fællesudgifter. Særlige begrænsninger for personbiler, repræsentation, gaver.
EU-HANDEL: Erhvervelsesmoms, reverse charge, OSS. Skattemæssigt: transfer pricing ved koncerninterne handler.
FAKTURAKRAV (ML § 52a, MB §§ 58-81): Korrekt faktura er forudsætning for momsfradrag — og danner grundlag for skatteregnskabet.
ANGIVELSE MOMS: Halvårlig (<5 mio.), kvartalsvis (5-50 mio.), månedlig (>50 mio.). Juni: 17. august.
SKATTEANSÆTTELSE: Ordinær genoptagelse 3 år (SFL § 26). Ekstraordinær 10 år ved svig (SFL § 27). Samme frister som moms — koordiner altid.

AKTUELLE SATSER 2026:
- Momssats: 25%
- Selskabsskat: 22% (SEL § 17)
- Topskat: 15% over ca. 615.000 kr. (PSL § 7)
- AM-bidrag: 8% (AMBL § 5)
- Aktieindkomst: 27% op til 61.000 kr. (par: 122.000 kr.), 42% derover (PSL § 8a)
- Afskrivning driftsmidler: 25% saldo
- Straksafskrivning: Under 32.900 kr. (2026)
- Repræsentationsfradrag skat: 25% af udgiften (LL § 8, stk. 4)
- Lønsumsafgift metode 1: 15,3% | metode 2/4: 6,37% | metode 3: 3,54%

INSTRUKTION: Besvar altid på dansk. Angiv præcist hvilke love der er relevante for det konkrete spørgsmål — BÅDE moms og skat hvis begge er berørt. Henvis til §-numre og lovbekendtgørelsesnumre. Gør altid eksplicit opmærksom på hvis en momsafgørelse har skattemæssige konsekvenser eller omvendt. Vær konkret og praktisk. Anbefal professionel rådgivning ved komplekse sager.`;

// ── CHAT ──────────────────────────────────────────────────────────────────────
function Chat() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,loading]);

  const send = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput("");
    setLoading(true);
    const newMsgs = [...messages,{role:"user",content:msg}];
    setMessages(newMsgs);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:AI_KNOWLEDGE,messages:newMsgs})
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Beklager, teknisk fejl.";
      setMessages([...newMsgs,{role:"assistant",content:reply}]);
    } catch(e) {
      setMessages([...newMsgs,{role:"assistant",content:"Der opstod en teknisk fejl. Prøv igen."}]);
    } finally { setLoading(false); }
  };

  const fmtMsg = (text) => text.split("\n").map((l,i)=>{
    if(!l.trim()) return <br key={i}/>;
    return <p key={i} style={{margin:"3px 0",lineHeight:1.65}}>{l}</p>;
  });

  return (
    <div style={{maxWidth:"860px",margin:"0 auto",padding:"2rem 1.5rem"}}>
      <SectionHeader title="Moms AI-rådgiver"/>
      <p style={{color:C.textSub,fontSize:"14px",marginBottom:"1.5rem"}}>
        Baseret på momsloven, momsbekendtgørelsen, momsforordningen (282/2011), EU's momsdirektiv, Den Juridiske Vejledning og retspraksis.
      </p>
      <div style={{borderRadius:"16px",overflow:"hidden",boxShadow:"0 8px 40px rgba(12,31,53,0.12),0 2px 8px rgba(12,31,53,0.06)"}}>
        <div style={{background:"linear-gradient(135deg,#0c1f35,#1a3558)",padding:"1.25rem 1.5rem",display:"flex",alignItems:"center",gap:"12px",borderRadius:"16px 16px 0 0"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px rgba(34,197,94,0.6)"}}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",color:C.white,fontWeight:600,fontSize:"15px"}}>Moms & Skat AI-rådgiver</div>
            <div style={{color:"rgba(255,255,255,0.45)",fontSize:"11px",letterSpacing:"0.05em"}}>ML · MB · MF · LL · SEL · DJV · Retspraksis</div>
          </div>
          <div style={{fontSize:"10px",color:"rgba(196,151,62,0.7)",background:"rgba(196,151,62,0.08)",border:"1px solid rgba(196,151,62,0.2)",borderRadius:"100px",padding:"3px 10px",letterSpacing:"0.06em",fontWeight:600}}>LIVE</div>
        </div>
        <div style={{background:C.bgCard,minHeight:"420px",maxHeight:"500px",overflowY:"auto",padding:"1.5rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
          {messages.length===0 && (
            <div style={{textAlign:"center",margin:"auto",padding:"2rem 0"}}>
              <div style={{fontSize:"40px",marginBottom:"0.75rem"}}>⚖️</div>
              <div style={{fontWeight:700,fontSize:"17px",marginBottom:"0.5rem"}}>Stil dit momsspørgsmål</div>
              <div style={{color:C.textSub,fontSize:"13px",marginBottom:"1.5rem"}}>Eller vælg et eksempel herunder</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"}}>
                {EXAMPLES.map(q=>(
                  <button key={q} onClick={()=>send(q)} style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:"100px",padding:"7px 16px",fontSize:"12px",cursor:"pointer",color:C.textSub,boxShadow:"0 1px 3px rgba(12,31,53,0.06)",transition:"all 0.15s",fontWeight:400}}>{q}</button>
                ))}
              </div>
            </div>
          )}
          {messages.map((m,i)=>(
            <div key={i} style={{
              alignSelf:m.role==="user"?"flex-end":"flex-start",
              background:m.role==="user"?C.navy:C.bgSecondary,
              color:m.role==="user"?C.white:C.text,
              border:m.role==="assistant"?`0.5px solid ${C.border}`:"none",
              borderRadius:m.role==="user"?"16px 16px 4px 16px":"4px 16px 16px 16px",
              padding:"10px 16px",maxWidth:"85%",fontSize:"14px",
            }}>
              {m.role==="assistant" ? fmtMsg(m.content) : m.content}
            </div>
          ))}
          {loading && (
            <div style={{alignSelf:"flex-start",background:C.bgSecondary,border:`0.5px solid ${C.border}`,borderRadius:"4px 16px 16px 16px",padding:"12px 16px"}}>
              <div style={{display:"flex",gap:"4px"}}>
                {[0,1,2].map(d=><div key={d} style={{width:"8px",height:"8px",borderRadius:"50%",background:C.textSub,animation:`bounce 1.2s ${d*0.2}s infinite`}}/>)}
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <div style={{background:C.bgCard,borderTop:`0.5px solid ${C.border}`,padding:"1rem 1.5rem",display:"flex",gap:"10px",alignItems:"flex-end"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
            placeholder="Stil dit momsspørgsmål her..."
            rows={1} style={{flex:1,background:C.bgSecondary,border:`0.5px solid ${C.borderMid}`,borderRadius:"8px",padding:"10px 14px",fontSize:"14px",resize:"none",minHeight:"42px",maxHeight:"120px",color:C.text}}
          />
          <button onClick={()=>send()} disabled={loading} style={{background:loading?"#aaa":`linear-gradient(135deg,${C.navy},#1a3558)`,color:C.white,border:"none",borderRadius:"10px",width:"42px",height:"42px",cursor:"pointer",fontSize:"16px",flexShrink:0,boxShadow:"0 2px 8px rgba(12,31,53,0.25)",transition:"all 0.15s"}}>↑</button>
        </div>
      </div>
      <div style={{marginTop:"1rem",padding:"11px 16px",background:"rgba(196,151,62,0.05)",border:"1px solid rgba(196,151,62,0.18)",borderRadius:"10px",fontSize:"12px",color:C.textSub,lineHeight:1.6}}>
        <strong>Bemærk:</strong> AI-assistenten er vejledende og udgør ikke juridisk eller revisionsmæssig rådgivning. Der tages forbehold for fejl og lovændringer. Kontakt en momsrevisor ved komplekse situationer.
      </div>
    </div>
  );
}

function Perioder() {
  const [tab, setTab] = useState("kvartal");
  const now = new Date(2026,4,9);
  const y = 2026;

  const halvaar = [
    {p:`1. halvår ${y}`,fra:new Date(y,0,1),til:new Date(y,5,30),frist:new Date(y,8,1)},
    {p:`2. halvår ${y}`,fra:new Date(y,6,1),til:new Date(y,11,31),frist:new Date(y+1,2,1)},
  ];
  const kvartaler = [
    {p:`1. kvartal ${y}`,fra:new Date(y,0,1),til:new Date(y,2,31),frist:new Date(y,5,1)},
    {p:`2. kvartal ${y}`,fra:new Date(y,3,1),til:new Date(y,5,30),frist:new Date(y,8,1)},
    {p:`3. kvartal ${y}`,fra:new Date(y,6,1),til:new Date(y,8,30),frist:new Date(y,11,1)},
    {p:`4. kvartal ${y}`,fra:new Date(y,9,1),til:new Date(y,11,31),frist:new Date(y+1,2,1)},
  ];
  const maaneder = Array.from({length:12},(_,i)=>({
    p:new Date(y,i,1).toLocaleString("da-DK",{month:"long",year:"numeric"}),
    fra:new Date(y,i,1),til:new Date(y,i+1,0),
    frist:i===5?new Date(y,7,17):new Date(y,i+1,25),
  }));

  const rows = tab==="halvaar"?halvaar:tab==="kvartal"?kvartaler:maaneder;
  const fmt = d=>d.toLocaleDateString("da-DK",{day:"numeric",month:"short",year:"numeric"});
  const status = frist => {
  const today = new Date();
  today.setHours(0,0,0,0);

  const due = new Date(frist);
  due.setHours(0,0,0,0);

  const d = Math.floor((due - today) / 86400000);

  if(d < 0) return {
    lbl:"Udløbet",
    c:C.red,
    bg:"rgba(239,68,68,0.1)"
  };

  if(d <= 14) return {
    lbl:`${d} dage`,
    c:C.yellow,
    bg:"rgba(245,158,11,0.1)"
  };

  return {
    lbl:`${d} dage`,
    c:C.green,
    bg:"rgba(34,197,94,0.1)"
  };
};

  return (
    <div style={{maxWidth:"1100px",margin:"0 auto",padding:"3rem 2rem"}}>
      <SectionHeader title={`Momsindberetningsperioder ${y}`}/>
      <CVROpslag />
      <div style={{background:"rgba(196,151,62,0.06)",border:"1px solid rgba(196,151,62,0.2)",borderRadius:"12px",padding:"12px 18px",fontSize:"13px",color:C.textSub,marginBottom:"1.5rem",lineHeight:1.6}}>
        <strong style={{color:C.gold}}>Hvem gælder hvad?</strong> · <strong>Halvårlig:</strong> under 5 mio. kr./år · <strong>Kvartalsvis:</strong> 5–50 mio. kr./år · <strong>Månedlig:</strong> over 50 mio. kr./år
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {[["halvaar","Halvårlig"],["kvartal","Kvartalsvis"],["maaned","Månedlig"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 20px",borderRadius:"8px",border:`1px solid ${tab===id?"transparent":C.border}`,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:"13.5px",fontWeight:tab===id?600:400,background:tab===id?C.navy:C.bgCard,color:tab===id?C.white:C.textSub,transition:"all 0.18s",boxShadow:tab===id?"0 2px 8px rgba(12,31,53,0.18)":"none"}}>{lbl}</button>
        ))}
      </div>
      <div style={{overflowX:"auto",borderRadius:"10px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <table style={{width:"100%",fontSize:"14px"}}>
          <thead>
            <tr style={{background:"linear-gradient(135deg,#0c1f35,#1a3558)",color:C.white}}>
              {["Periode","Fra","Til","Angivelsesfrist","Status"].map(h=>(
                <th key={h} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,fontSize:"13px"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i)=>{
              const s=status(r.frist);
              const isAct=now>=r.fra&&now<=r.til;
              return (
                <tr key={i} style={{background:isAct?"rgba(196,151,62,0.07)":i%2===0?C.bgCard:C.bgSecondary,borderBottom:`0.5px solid ${C.border}`}}>
                  <td style={{padding:"10px 14px",fontWeight:isAct?700:400}}>
                    {r.p} {isAct&&<span style={{fontSize:"11px",background:C.gold,color:C.navy,borderRadius:"10px",padding:"2px 8px",marginLeft:"6px",fontWeight:700}}>Aktuel</span>}
                  </td>
                  <td style={{padding:"10px 14px",color:C.textSub}}>{fmt(r.fra)}</td>
                  <td style={{padding:"10px 14px",color:C.textSub}}>{fmt(r.til)}</td>
                  <td style={{padding:"10px 14px",fontWeight:600}}>{fmt(r.frist)}</td>
                  <td style={{padding:"10px 14px"}}><span style={{background:s.bg,color:s.c,borderRadius:"12px",padding:"3px 10px",fontSize:"12px",fontWeight:600}}>{s.lbl}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:"2rem",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:"1rem"}}>
        {[
          ["📅","Halvårlig – frister","1. halvår angives senest 1. september. 2. halvår senest 1. marts det følgende år."],
          ["⚠️","Juni-undtagelse (månedlig)","Momsen for juni angives og betales først den 17. august — ikke den 25. juli."],
          ["🏦","Bankdagsreglen","Falder fristen på weekend eller helligdag, udskydes den til næste bankdag."],
          ["🆕","Nyregistrerede","Angiver kvartalsvis. Hvis forventet omsætning overstiger 55 mio. kr., er perioden månedlig."],
        ].map(([ic,ti,tx])=>(
          <Card key={ti} style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
            <div style={{fontSize:"22px",flexShrink:0}}>{ic}</div>
            <div><div style={{fontWeight:700,fontSize:"14px",marginBottom:"4px"}}>{ti}</div><p style={{margin:0,fontSize:"13px",color:C.textSub,lineHeight:1.6}}>{tx}</p></div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function Beregner() {
  const [beloeb, setBeloeb] = useState("");

  const [sats, setSats] = useState("25");

  const num = parseFloat(beloeb.replace(",",".")) || 0;
  const pct = parseFloat(sats)/100;
  const momsBeloeb = retning==="tilfoej" ? num*pct : num-num/(1+pct);
  const ekskl = retning==="tilfoej" ? num : num/(1+pct);
  const inkl = retning==="tilfoej" ? num*(1+pct) : num;
  const fmt2 = n=>n.toLocaleString("da-DK",{minimumFractionDigits:2,maximumFractionDigits:2});

  const inp = {padding:"11px 14px",borderRadius:"10px",border:`1px solid ${C.border}`,background:C.bgCard,color:C.text,fontSize:"15px",width:"100%",boxShadow:"0 1px 3px rgba(12,31,53,0.05)",outline:"none",transition:"border-color 0.15s"};

          </div>
          <div>

              {[["tilfoej","➕ Læg moms til"],["fratræk","➖ Træk moms fra"]].map(([v,l])=>(
                <button key={v} onClick={()=>setRetning(v)} style={{padding:"9px 16px",borderRadius:"8px",border:`1.5px solid ${retning===v?C.navy:C.borderMid}`,background:retning===v?C.navy:C.bgSecondary,color:retning===v?C.white:C.text,cursor:"pointer",fontSize:"14px",transition:"all 0.15s"}}>{l}</button>
              ))}

            <p style={{margin:"6px 0 0",fontSize:"12px",color:C.textSub}}>{retning==="tilfoej"?"Du angiver ekskl. moms — beregner inkl. moms.":"Du angiver inkl. moms — beregner momsandelen."}</p>
          </div>
          <div>
            <label style={{display:"block",fontSize:"12px",fontWeight:700,color:C.textSub,marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Momssats</label>
            <select value={sats} onChange={e=>setSats(e.target.value)} style={inp}>
              <option value="25">25% — Standard dansk moms</option>
              <option value="0">0% — Momsfrit / nulmoms</option>
            </select>
          </div>
        </div>
        <Card>
          <div style={{fontSize:"12px",fontWeight:700,color:C.textSub,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"1rem"}}>Resultat</div>
          {num>0 ? (
            <>

                <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`0.5px solid ${C.border}`}}>

function Momstraening() {
  const [aktivtModul, setAktivtModul] = useState(null);
  const [aktivLektion, setAktivLektion] = useState(0);
  const [fase, setFase] = useState("laes"); // laes | quiz | resultat
  const [svar, setSvar] = useState({});
  const [gennemfoert, setGennemfoert] = useState({});

  const modul = aktivtModul !== null ? MODULER[aktivtModul] : null;
  const lektion = modul ? modul.lektioner[aktivLektion] : null;

  const startQuiz = () => { setSvar({}); setFase("quiz"); };

  const vælgSvar = (qi, si) => {
    if (svar[qi] !== undefined) return;
    setSvar(prev => ({...prev, [qi]: si}));
  };

  const afslutQuiz = () => {
    const score = lektion.quiz.filter((q,i) => svar[i] === q.k).length;
    const key = `${aktivtModul}-${aktivLektion}`;
    setGennemfoert(prev => ({...prev, [key]: score}));
    setFase("resultat");
  };

  const nesteLektion = () => {
    if (aktivLektion < modul.lektioner.length - 1) {
      setAktivLektion(aktivLektion + 1);
      setFase("laes");
      setSvar({});
    } else {
      setAktivtModul(null);
      setAktivLektion(0);
      setFase("laes");
    }
  };

  const fremgang = () => {
    let total = 0, done = 0;
    MODULER.forEach((m,mi) => m.lektioner.forEach((_,li) => {
      total++;
      if (gennemfoert[`${mi}-${li}`] !== undefined) done++;
    }));
    return Math.round((done/total)*100);
  };

  // Oversigt
  if (aktivtModul === null) return (
    <div style={{maxWidth:"1100px",margin:"0 auto",padding:"3rem 2rem"}}>
      <SectionHeader title="Akademiet — Moms & Skat A–Z"/>
      <p style={{color:C.textSub,maxWidth:"680px",lineHeight:1.7,marginBottom:"1rem"}}>
        Lær moms og skat fra bunden med strukturerede moduler, praktiske eksempler og quizzer der tester din viden. Hvert modul bygger videre på det forrige.
      </p>
      <div style={{background:`rgba(196,151,62,0.08)`,border:`0.5px solid rgba(196,151,62,0.3)`,borderRadius:"10px",padding:"14px 18px",marginBottom:"2rem",display:"flex",alignItems:"center",gap:"16px"}}>
        <div style={{fontSize:"13px",color:C.textSub,flex:1}}>
          <strong style={{color:C.gold}}>Din fremgang</strong> — {fremgang()}% gennemført
        </div>
        <div style={{width:"200px",height:"8px",background:C.bgSecondary,borderRadius:"4px",overflow:"hidden"}}>
          <div style={{width:`${fremgang()}%`,height:"100%",background:C.gold,borderRadius:"4px",transition:"width 0.5s"}}/>
        </div>
        <div style={{fontWeight:700,color:C.gold,fontSize:"15px"}}>{fremgang()}%</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:"1.5rem"}}>
        {MODULER.map((m,mi)=>{
          const lDone = m.lektioner.filter((_,li)=>gennemfoert[`${mi}-${li}`]!==undefined).length;
          const pct = Math.round((lDone/m.lektioner.length)*100);
          return (
            <div key={m.id} onClick={()=>{setAktivtModul(mi);setAktivLektion(0);setFase("laes");}} style={{background:C.bgCard,border:`0.5px solid ${C.border}`,borderRadius:"12px",padding:"1.5rem",cursor:"pointer",transition:"all 0.15s",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:C.bgSecondary}}>
                <div style={{width:`${pct}%`,height:"100%",background:C.gold}}/>
              </div>
              <div style={{fontSize:"28px",marginBottom:"0.75rem"}}>{m.emoji}</div>
              <div style={{fontWeight:700,fontSize:"15px",color:C.navy,marginBottom:"6px"}}>{m.titel}</div>
              <p style={{fontSize:"13px",color:C.textSub,lineHeight:1.6,marginBottom:"1rem"}}>{m.intro}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:"12px",color:C.textSub}}>{m.lektioner.length} lektioner · {m.lektioner.length} quizzer</span>
                <span style={{fontSize:"12px",fontWeight:700,color:pct===100?C.green:C.gold}}>{pct===100?"✓ Gennemført":lDone===0?"Start →":`${lDone}/${m.lektioner.length} done`}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // Lektionsvisning
  return (
    <div style={{maxWidth:"860px",margin:"0 auto",padding:"2rem 1.5rem"}}>
      <button onClick={()=>{setAktivtModul(null);setFase("laes");}} style={{background:"none",border:"none",cursor:"pointer",color:C.textSub,fontSize:"14px",marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:"6px"}}>← Tilbage til oversigt</button>
      <div style={{display:"flex",gap:"8px",marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {modul.lektioner.map((_,li)=>{
          const done = gennemfoert[`${aktivtModul}-${li}`] !== undefined;
          return (
            <button key={li} onClick={()=>{setAktivLektion(li);setFase("laes");setSvar({});}} style={{padding:"6px 14px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"13px",fontFamily:"Georgia,serif",background:li===aktivLektion?C.navy:done?"rgba(34,197,94,0.15)":C.bgSecondary,color:li===aktivLektion?C.white:done?C.green:C.textSub,fontWeight:li===aktivLektion?700:400}}>
              {done?"✓ ":""}{li+1}. {modul.lektioner[li].titel.substring(0,20)}...
            </button>
          );
        })}
      </div>

      <Card>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1.5rem",gap:"1rem"}}>
          <div>
            <div style={{fontSize:"12px",color:C.textSub,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"4px"}}>{modul.emoji} {modul.titel}</div>
            <h3 style={{fontSize:"1.3rem",fontWeight:700,color:C.navy}}>{lektion.titel}</h3>
          </div>
          <div style={{fontSize:"24px",flexShrink:0}}>{fase==="laes"?"📖":fase==="quiz"?"🧠":"🎯"}</div>
        </div>

        {fase === "laes" && (
          <>
            <p style={{color:C.textSub,lineHeight:1.8,fontSize:"15px",marginBottom:"1.25rem"}}>{lektion.tekst}</p>
            <div style={{background:C.bgSecondary,borderRadius:"8px",padding:"1rem 1.25rem",marginBottom:"1.25rem"}}>
              <div style={{fontWeight:700,fontSize:"13px",marginBottom:"0.75rem",color:C.navy}}>Nøglepunkter</div>
              {lektion.punkt.map((p,i)=>(
                <div key={i} style={{display:"flex",gap:"10px",marginBottom:"6px",fontSize:"13px",color:C.textSub,lineHeight:1.5}}>
                  <span style={{color:C.gold,flexShrink:0,marginTop:"2px"}}>→</span><span>{p}</span>
                </div>
              ))}
            </div>
            <div style={{background:"rgba(196,151,62,0.08)",border:`0.5px solid rgba(196,151,62,0.3)`,borderRadius:"8px",padding:"1rem 1.25rem",marginBottom:"1.5rem"}}>
              <div style={{fontWeight:700,fontSize:"13px",marginBottom:"6px",color:C.gold}}>💡 Praktisk eksempel</div>
              <p style={{fontSize:"13px",color:C.textSub,lineHeight:1.6,margin:0}}>{lektion.eksempel}</p>
            </div>
            <button onClick={startQuiz} style={{background:C.navy,color:C.white,border:"none",padding:"12px 28px",borderRadius:"8px",fontWeight:700,fontSize:"15px",cursor:"pointer"}}>Tag quiz →</button>
          </>
        )}

        {fase === "quiz" && (
          <>
            <div style={{fontWeight:700,fontSize:"16px",marginBottom:"1.25rem",color:C.navy}}>Test din viden 🧠</div>
            {lektion.quiz.map((q,qi)=>(
              <div key={qi} style={{marginBottom:"1.5rem"}}>
                <div style={{fontWeight:600,fontSize:"14px",marginBottom:"0.75rem"}}>{qi+1}. {q.sp}</div>
                <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                  {q.sv.map((s,si)=>{
                    const valgt = svar[qi] === si;
                    const rigtigt = si === q.k;
                    const visResultat = svar[qi] !== undefined;
                    let bg = C.bgSecondary, border = C.borderMid, color = C.text;
                    if (visResultat && rigtigt) { bg="rgba(34,197,94,0.12)"; border=C.green; color=C.green; }
                    else if (visResultat && valgt && !rigtigt) { bg="rgba(239,68,68,0.1)"; border=C.red; color=C.red; }
                    return (
                      <button key={si} onClick={()=>vælgSvar(qi,si)} style={{padding:"10px 14px",borderRadius:"8px",border:`1.5px solid ${border}`,background:bg,color,cursor:visResultat?"default":"pointer",textAlign:"left",fontSize:"14px",fontFamily:"Georgia,serif",transition:"all 0.15s"}}>
                        {visResultat && rigtigt && "✓ "}{visResultat && valgt && !rigtigt && "✗ "}{s}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
            {Object.keys(svar).length === lektion.quiz.length && (
              <button onClick={afslutQuiz} style={{background:C.gold,color:C.navy,border:"none",padding:"12px 28px",borderRadius:"8px",fontWeight:700,fontSize:"15px",cursor:"pointer",marginTop:"0.5rem"}}>Se resultat →</button>
            )}
          </>
        )}

        {fase === "resultat" && (()=>{
          const score = lektion.quiz.filter((q,i)=>svar[i]===q.k).length;
          const total = lektion.quiz.length;
          const pct = Math.round((score/total)*100);
          return (
            <>
              <div style={{textAlign:"center",padding:"1.5rem 0"}}>
                <div style={{fontSize:"52px",marginBottom:"0.5rem"}}>{pct===100?"🏆":pct>=50?"👍":"📚"}</div>
                <div style={{fontSize:"26px",fontWeight:700,color:pct===100?C.green:pct>=50?C.gold:C.red,marginBottom:"6px"}}>{score}/{total} rigtige</div>
                <div style={{fontSize:"14px",color:C.textSub,marginBottom:"1.5rem"}}>{pct===100?"Perfekt! Du har styr på dette emne.":pct>=50?"Godt klaret! Læs evt. lektionen igen for at fange de sidste detaljer.":"Prøv at læse lektionen igen — det sidder snart."}</div>
                <div style={{display:"flex",gap:"1rem",justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={()=>setFase("laes")} style={{background:C.bgSecondary,color:C.text,border:`0.5px solid ${C.borderMid}`,padding:"10px 22px",borderRadius:"8px",cursor:"pointer",fontSize:"14px",fontFamily:"Georgia,serif"}}>← Læs igen</button>
                  <button onClick={nesteLektion} style={{background:C.navy,color:C.white,border:"none",padding:"10px 22px",borderRadius:"8px",fontWeight:700,cursor:"pointer",fontSize:"14px",fontFamily:"Georgia,serif"}}>{aktivLektion < modul.lektioner.length-1 ? "Næste lektion →" : "Tilbage til oversigt →"}</button>
                </div>
              </div>
            </>
          );
        })()}
      </Card>
    </div>
  );
}


// ── MOMS COMPLIANCE ────────────────────────────────────────────────────────────
function MomsCompliance() {
  const [fase, setFase] = useState("start"); // start | cvr | analyse | upload | rapport
  const [cvr, setCvr] = useState("");
  const [cvrData, setCvrData] = useState(null);
  const [cvrLoading, setCvrLoading] = useState(false);
  const [cvrFejl, setCvrFejl] = useState("");
  const [aiAnalyse, setAiAnalyse] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [filer, setFiler] = useState([]);
  const [filAnalyse, setFilAnalyse] = useState("");
  const [filLoading, setFilLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const filRef = useRef(null);

  // ── CVR opslag via Claude AI med web_search ──
  const slaOpCVR = async () => {
    const cleaned = cvr.replace(/\D/g,"");
    if (!/^\d{8}$/.test(cleaned)) { setCvrFejl("CVR-nummer skal være præcis 8 cifre."); return; }
    setCvrFejl(""); setCvrLoading(true); setCvrData(null); setAiAnalyse("");
    try {
      // Brug Claude med web_search til at hente CVR-data — omgår CORS
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          tools: [{"type":"web_search_20250305","name":"web_search"}],
          messages: [{
            role: "user",
            content: "Slå CVR-nummer " + cleaned + " op på cvr.dk eller virk.dk og returner følgende oplysninger som JSON og KUN JSON uden forklaring eller markdown:\n{\"navn\":\"...\",\"cvr\":\"" + cleaned + "\",\"status\":\"AKTIV eller OPHØRT\",\"branche\":\"...\",\"brancheKode\":\"...\",\"adresse\":\"...\",\"ansatte\":\"...\",\"stiftet\":\"...\",\"ejerform\":\"...\"}"
          }]
        })
      });
      const data = await res.json();
      // Find tekst-svaret fra Claude
      const tekstBlokke = (data.content||[]).filter(b=>b.type==="text");
      const raaJson = tekstBlokke.map(b=>b.text).join("");
      // Udtræk JSON fra svaret
      const jsonMatch = raaJson.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Ingen JSON i svar");
      const virk = JSON.parse(jsonMatch[0]);
      virk.cvr = cleaned;
      setCvrData(virk);
      setFase("analyse");
      hentAiAnalyse(virk);
    } catch(e) {
      setCvrFejl("Kunne ikke hente CVR-data. Prøv igen om et øjeblik.");
    }
    setCvrLoading(false);
  };

  // ── AI compliance-analyse baseret på CVR-data ──
  const hentAiAnalyse = async (virk) => {
    setAiLoading(true);
    const ansatteStr = virk.ansatte !== undefined ? String(virk.ansatte) : "ukendt";
    const prompt = "Du er en erfaren dansk moms- og skatterådgiver. Analysér følgende virksomhed og giv en konkret compliance-vurdering for BÅDE moms og skat.\n\n"
      + "VIRKSOMHEDSDATA FRA CVR:\n"
      + "- Navn: " + virk.navn + "\n"
      + "- CVR: " + virk.cvr + "\n"
      + "- Status: " + virk.status + "\n"
      + "- Branche: " + virk.branche + " (kode: " + virk.brancheKode + ")\n"
      + "- Adresse: " + virk.adresse + "\n"
      + "- Antal ansatte: " + ansatteStr + "\n"
      + "- Stiftet: " + virk.stiftet + "\n"
      + "- Ejerform: " + virk.ejerform + "\n\n"
      + "Giv en struktureret compliance-analyse med disse 6 afsnit:\n\n"
      + "1. MOMSSTATUS - Er virksomheden momspligtig, momsfritaget eller blandet? Sandsynlig momsperiode? Lønsumsafgiftspligt? (ML § 13, LSAL)\n\n"
      + "2. SKATTEMÆSSIG STATUS - Selskab eller personlig virksomhed? Relevant beskatningsform (SEL, PSL, VSL)? Skattepligtig indkomst og relevante fradrag?\n\n"
      + "3. BRANCHESPECIFIKKE RISICI (moms) - Typiske momsfejl i denne branche? Fradragsbegrænsninger, reverse charge, fast ejendom osv.\n\n"
      + "4. BRANCHESPECIFIKKE RISICI (skat) - Typiske skattemæssige fejl? Afskrivninger, personalegoder (LL § 16), repræsentation (LL § 8), transfer pricing osv.\n\n"
      + "5. SAMSPIL MOMS/SKAT - Hvor er der asymmetri? Hvad giver fradrag i moms men ikke skat (eller omvendt)? Fx biler, repræsentation, etableringsomkostninger.\n\n"
      + "6. TOP 5 ANBEFALINGER - De vigtigste konkrete handlinger virksomheden bør foretage med lovhenvisninger (ML §, LL §, SEL §).\n\n"
      + "Vær konkret og henvis altid til relevante lovparagraffer.";

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{role:"user", content: prompt}]
        })
      });
      const data = await res.json();
      setAiAnalyse(data.content?.[0]?.text || "Analyse ikke tilgængelig.");
    } catch(e) {
      setAiAnalyse("Der opstod en fejl ved AI-analysen. Prøv igen.");
    }
    setAiLoading(false);
  };

  // ── Fil-upload og analyse ──
  const behandlFiler = (nyeFiler) => {
    const tilladte = Array.from(nyeFiler).filter(f =>
      f.type === "application/pdf" ||
      f.type === "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" ||
      f.type === "application/vnd.ms-excel" ||
      f.name.endsWith(".xlsx") || f.name.endsWith(".xls") || f.name.endsWith(".pdf") || f.name.endsWith(".csv")
    );
    if (tilladte.length === 0) return;
    setFiler(prev => [...prev, ...tilladte.map(f => ({fil:f, navn:f.name, str: (f.size/1024).toFixed(0)+"KB", type: f.name.endsWith(".pdf")?"PDF":"Excel/CSV"}))]);
  };

  const analyserFiler = async () => {
    if (filer.length === 0) return;
    setFilLoading(true); setFilAnalyse("");

    // Læs filer som tekst/base64
    const filIndhold = await Promise.all(filer.map(async ({fil, navn, type}) => {
      if (type === "PDF") {
        const b64 = await new Promise(res => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.readAsDataURL(fil);
        });
        return { navn, type, b64, erPdf: true };
      } else {
        const tekst = await new Promise(res => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.readAsText(fil);
        });
        return { navn, type, tekst: tekst.substring(0, 8000), erPdf: false };
      }
    }));

    const virksomhedInfo = cvrData ? `Virksomhed: ${cvrData.navn} (CVR: ${cvrData.cvr}), Branche: ${cvrData.branche}` : "Ukendt virksomhed";

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{role:"user", content}]
        })
      });
      const data = await res.json();
      setFilAnalyse(data.content?.[0]?.text || "Analyse ikke tilgængelig.");
      setFase("rapport");

  return (
    <div style={{maxWidth:"1000px",margin:"0 auto",padding:"3rem 2rem"}}>
      <SectionHeader title="Moms & Skat Compliance"/>
      <p style={{color:C.textSub,maxWidth:"680px",lineHeight:1.7,marginBottom:"2rem"}}>
        Slå din virksomhed op på CVR og få en øjeblikkelig AI-drevet compliance-analyse for BÅDE moms og skat. Upload saldobalance eller kontokort for at spotte konkrete fejl og skattemæssige risici.

      {/* ── Trin-indikator ── */}
      {(() => {

                      {passeret?"✓":nr}

                </React.Fragment>
              );
            })}
          </div>
        );
      })()}

      {/* ── TRIN 1: CVR-opslag ── */}
      {(fase==="start"||fase==="cvr") && (
        <Card style={{maxWidth:"600px"}}>
          <div style={{display:"flex",gap:"12px",alignItems:"center",marginBottom:"1.25rem"}}>
            <div style={{fontSize:"32px"}}>🔍</div>
            <div><div style={{fontWeight:700,fontSize:"17px",color:C.navy}}>Søg på CVR-nummer</div>
            <div style={{fontSize:"13px",color:C.textSub}}>Vi henter virksomhedsoplysninger fra det officielle CVR-register</div></div>
          </div>
          <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
            <input value={cvr} onChange={e=>setCvr(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&slaOpCVR()}
              placeholder="Indtast 8-cifret CVR-nummer" maxLength={8}
              style={{flex:1,minWidth:"200px",padding:"12px 16px",borderRadius:"8px",border:`1.5px solid ${cvrFejl?C.red:C.borderMid}`,background:C.bgSecondary,color:C.text,fontSize:"16px",letterSpacing:"2px"}}
            />
            <button onClick={slaOpCVR} disabled={cvrLoading} style={{background:cvrLoading?"#aaa":C.navy,color:C.white,border:"none",padding:"12px 24px",borderRadius:"8px",fontWeight:700,fontSize:"14px",cursor:"pointer",whiteSpace:"nowrap"}}>
              {cvrLoading?"⏳ Søger...":"Analysér →"}
            </button>
          </div>
          {cvrFejl && <div style={{marginTop:"8px",fontSize:"13px",color:C.red,display:"flex",gap:"6px",alignItems:"center"}}>⚠️ {cvrFejl}</div>}
          <div style={{marginTop:"1rem",fontSize:"12px",color:C.textSub,lineHeight:1.6}}>
            Data hentes fra <strong>cvrapi.dk</strong> — det officielle danske CVR-register. Oplysninger om navn, branche, adresse og virksomhedstype bruges til AI-analysen.
          </div>
        </Card>
      )}

      {/* ── TRIN 2: CVR-data + AI-analyse ── */}
      {fase==="analyse" && cvrData && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
          <Card>
            <div style={{fontWeight:700,fontSize:"15px",color:C.navy,marginBottom:"1rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>📋 Virksomhedsoplysninger</span>
              <span style={{background:cvrData.status==="AKTIV"?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.1)",color:cvrData.status==="AKTIV"?C.green:C.red,border:`0.5px solid ${cvrData.status==="AKTIV"?C.green:C.red}`,borderRadius:"20px",padding:"3px 12px",fontSize:"12px",fontWeight:700}}>{cvrData.status}</span>
            </div>
            {[["Navn",cvrData.navn],["CVR",cvrData.cvr],["Branche",cvrData.branche||"—"],["Branchekode",cvrData.brancheKode||"—"],["Adresse",cvrData.adresse||"—"],["Ansatte",cvrData.ansatte!==undefined?String(cvrData.ansatte):"—"],["Stiftet",cvrData.stiftet||"—"],["Ejerform",cvrData.ejerform||"—"]].map(([l,v])=>(
              <div key={l} style={{display:"flex",gap:"10px",padding:"6px 0",borderBottom:`0.5px solid ${C.border}`}}>
                <span style={{fontSize:"13px",color:C.textSub,minWidth:"90px",flexShrink:0}}>{l}</span>
                <span style={{fontSize:"13px",fontWeight:600,color:C.text}}>{v}</span>
              </div>
            ))}
            <button onClick={()=>{setCvrData(null);setCvr("");setFase("start");setAiAnalyse("");setFiler([]);setFilAnalyse("");}} style={{marginTop:"1rem",background:"none",border:`0.5px solid ${C.borderMid}`,borderRadius:"6px",padding:"6px 14px",fontSize:"12px",cursor:"pointer",color:C.textSub}}>← Søg nyt CVR</button>
          </Card>

          <Card>
            <div style={{fontWeight:700,fontSize:"15px",color:C.navy,marginBottom:"1rem"}}>🤖 AI Compliance-analyse — Moms & Skat</div>
            {aiLoading ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"2rem 0",gap:"1rem"}}>
                <div style={{width:"32px",height:"32px",border:`3px solid ${C.border}`,borderTop:`3px solid ${C.navy}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
                <div style={{fontSize:"13px",color:C.textSub}}>Analyserer virksomheden...</div>
              </div>
            ) : (
              <div style={{maxHeight:"400px",overflowY:"auto",fontSize:"14px",lineHeight:1.7}}>
                {fmtTekst(aiAnalyse)}
              </div>
            )}
          </Card>
        </div>
      )}

      {/* ── TRIN 3: Upload filer ── */}
      {fase==="analyse" && !aiLoading && aiAnalyse && (
        <Card style={{marginBottom:"1.5rem"}}>
          <div style={{fontWeight:700,fontSize:"16px",color:C.navy,marginBottom:"0.5rem"}}>📁 Upload regnskabsmateriale til dybere analyse</div>
          <p style={{fontSize:"13px",color:C.textSub,marginBottom:"1.25rem",lineHeight:1.6}}>
            Upload saldobalance, kontokort eller kassekladdeposter (PDF eller Excel/CSV) — AI'en scanner materialet og spotter konkrete momsfejl, manglende fradrag og posteringsfejl.
          </p>

          {/* Dropzone */}
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true)}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);behandlFiler(e.dataTransfer.files)}}
            onClick={()=>filRef.current.click()}
            style={{border:`2px dashed ${dragOver?C.navy:C.borderMid}`,borderRadius:"12px",padding:"2rem",textAlign:"center",cursor:"pointer",background:dragOver?"rgba(15,39,64,0.04)":C.bgSecondary,transition:"all 0.15s",marginBottom:"1rem"}}
          >
            <div style={{fontSize:"36px",marginBottom:"0.5rem"}}>📂</div>
            <div style={{fontWeight:700,fontSize:"15px",color:C.navy,marginBottom:"4px"}}>Træk filer hertil eller klik for at vælge</div>
            <div style={{fontSize:"13px",color:C.textSub}}>Understøtter PDF, Excel (.xlsx, .xls) og CSV</div>
            <input ref={filRef} type="file" multiple accept=".pdf,.xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>behandlFiler(e.target.files)}/>
          </div>

          {/* Fil-liste */}
          {filer.length > 0 && (
            <div style={{marginBottom:"1.25rem"}}>
              {filer.map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 12px",background:C.bgCard,border:`0.5px solid ${C.border}`,borderRadius:"8px",marginBottom:"6px"}}>
                  <span style={{fontSize:"20px"}}>{f.type==="PDF"?"📄":"📊"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"14px",fontWeight:600}}>{f.navn}</div>
                    <div style={{fontSize:"12px",color:C.textSub}}>{f.type} · {f.str}</div>
                  </div>
                  <button onClick={()=>setFiler(prev=>prev.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:C.textSub,padding:"4px"}}>×</button>
                </div>
              ))}
            </div>
          )}

          <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
            <button onClick={analyserFiler} disabled={filer.length===0||filLoading} style={{background:filer.length===0?"#ccc":`linear-gradient(135deg,${C.gold},#b8882e)`,color:C.navy,border:"none",padding:"12px 28px",borderRadius:"10px",fontWeight:700,fontSize:"14px",cursor:filer.length===0?"default":"pointer",boxShadow:filer.length===0?"none":"0 4px 16px rgba(196,151,62,0.3)"}}>
              {filLoading?"⏳ Analyserer...":"🔍 Analyser filer"}
            </button>
            <button onClick={()=>setFase("rapport")} style={{background:"none",border:`0.5px solid ${C.borderMid}`,borderRadius:"8px",padding:"12px 20px",fontSize:"14px",cursor:"pointer",color:C.textSub}}>Spring over →</button>
          </div>
          {filLoading && (
            <div style={{marginTop:"1rem",padding:"12px 16px",background:"rgba(196,151,62,0.08)",border:`0.5px solid rgba(196,151,62,0.3)`,borderRadius:"8px",fontSize:"13px",color:C.textSub}}>
              ⏳ AI-en gennemgår dit regnskabsmateriale og leder efter momsfejl... Dette kan tage 15-30 sekunder.
            </div>
          )}
        </Card>
      )}

      {/* ── TRIN 4: Fuld rapport ── */}
      {fase==="rapport" && (
        <div style={{display:"flex",flexDirection:"column",gap:"1.5rem"}}>
          {cvrData && (
            <div style={{background:"linear-gradient(135deg,#0c1f35,#1a3558)",borderRadius:"16px",padding:"1.5rem 2rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"1rem",border:"1px solid rgba(196,151,62,0.2)",boxShadow:"0 8px 30px rgba(12,31,53,0.12)"}}>
              <div>
                <div style={{color:"rgba(255,255,255,0.6)",fontSize:"12px",marginBottom:"4px"}}>COMPLIANCE RAPPORT</div>
                <div style={{color:C.white,fontWeight:700,fontSize:"20px"}}>{cvrData.navn}</div>
                <div style={{color:"rgba(255,255,255,0.6)",fontSize:"13px"}}>CVR {cvrData.cvr} · {cvrData.branche}</div>
              </div>
              <div style={{display:"flex",gap:"10px"}}>
                <button onClick={()=>window.print()} style={{background:"rgba(255,255,255,0.1)",color:C.white,border:"0.5px solid rgba(255,255,255,0.3)",padding:"8px 18px",borderRadius:"8px",fontSize:"13px",cursor:"pointer"}}>🖨 Print rapport</button>
                <button onClick={()=>{setCvrData(null);setCvr("");setFase("start");setAiAnalyse("");setFiler([]);setFilAnalyse("");}} style={{background:C.gold,color:C.navy,border:"none",padding:"8px 18px",borderRadius:"8px",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>Ny analyse</button>
              </div>
            </div>
          )}

          {aiAnalyse && (
            <Card>
              <div style={{fontWeight:700,fontSize:"16px",color:C.navy,marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:"8px"}}>
                <span>🤖</span> AI Compliance-analyse — Branchebaseret
              </div>
              <div style={{fontSize:"14px",lineHeight:1.8}}>{fmtTekst(aiAnalyse)}</div>
            </Card>
          )}

          {filAnalyse && (
            <Card>
              <div style={{fontWeight:700,fontSize:"16px",color:C.navy,marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:"8px"}}>
                <span>📊</span> Regnskabsanalyse — Fundne momsfejl og mangler
              </div>
              <div style={{fontSize:"14px",lineHeight:1.8}}>{fmtTekst(filAnalyse)}</div>
            </Card>
          )}

          <Card style={{background:"rgba(196,151,62,0.06)",border:`0.5px solid rgba(196,151,62,0.3)`}}>
            <div style={{fontWeight:700,fontSize:"14px",color:C.gold,marginBottom:"6px"}}>⚠️ Ansvarsfraskrivelse</div>
            <p style={{fontSize:"13px",color:C.textSub,lineHeight:1.6,margin:0}}>Denne rapport er genereret automatisk af AI baseret på de indsendte oplysninger. Den erstatter ikke professionel revisorrådgivning og bør følges op af en kvalificeret momsrevisor. Kontakt os for en dybdegående gennemgang.</p>
          </Card>
        </div>
      )}
    </div>
  );
}
function App() {
  const [active, setActive] = useState(hentAktivSide);

  // Opdater URL når siden skifter
  const navigate = (id) => {
    const sti = RUTER[id] || "/";
    window.history.pushState({id}, "", sti);
    setActive(id);
    window.scrollTo(0,0);
  };

  // Håndter browser tilbage/frem-knapper
  useEffect(() => {
    const handlePop = () => setActive(hentAktivSide());
    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);

  return (
    <div style={{minHeight:"100vh",background:"#f0ede8",display:"flex",flexDirection:"column"}}>
      <Nav active={active} navigate={navigate}/>
      <main style={{flex:1}}>
        {active==="home" && <Home navigate={navigate}/>}
        {active==="compliance" && <MomsCompliance/>}
        {active==="sporg" && <Chat/>}
        {active==="hvad" && <HvadErMoms/>}
        {active==="perioder" && <Perioder/>}
        {active==="beregner" && <Beregner/>}
        {active==="traening" && <Momstraening/>}
        {active==="ydelser" && <Ydelser/>}
        {active==="om" && <OmOs/>}
        {active==="kontakt" && <Kontakt/>}
      </main>
      <footer style={{background:"#07131f",borderTop:"1px solid rgba(196,151,62,0.12)"}}>
        <div style={{maxWidth:"1100px",margin:"0 auto",padding:"3rem 2rem 2rem",display:"grid",gridTemplateColumns:"1fr auto",gap:"3rem",alignItems:"start"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"1rem"}}>
              <div style={{width:"30px",height:"30px",borderRadius:"7px",background:"rgba(196,151,62,0.12)",border:"1px solid rgba(196,151,62,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>⚖</div>
              <div style={{fontFamily:"'Playfair Display',serif",color:"rgba(255,255,255,0.9)",fontWeight:600,fontSize:"15px"}}>MomsRevisor A/S</div>
            </div>
            <p style={{fontSize:"13px",color:"rgba(255,255,255,0.35)",lineHeight:1.7,maxWidth:"380px",marginBottom:"1.25rem"}}>
              Specialiseret momsrådgivning for danske virksomheder. Vi kombinerer juridisk ekspertise med AI-teknologi.
            </p>
            <div style={{fontSize:"12px",color:"rgba(255,255,255,0.25)",lineHeight:1.6,maxWidth:"480px",padding:"12px 16px",background:"rgba(255,255,255,0.03)",borderRadius:"8px",border:"1px solid rgba(255,255,255,0.06)"}}>
              ⚠ AI-assistenten er vejledende og udgør ikke juridisk eller revisionsmæssig rådgivning. Der tages forbehold for fejl og lovændringer.
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"12px",color:"rgba(255,255,255,0.3)",lineHeight:2}}>
              <div>Bredgade 20, 1260 København K</div>
              <div>+45 33 11 22 33</div>
              <div>info@momsrevisor.dk</div>
            </div>
          </div>
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",padding:"1rem 2rem",textAlign:"center"}}>
          <span style={{fontSize:"11px",color:"rgba(255,255,255,0.2)",letterSpacing:"0.05em"}}>© 2026 MOMSREVISOR A/S · CVR 12345678</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
